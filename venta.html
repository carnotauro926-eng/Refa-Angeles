<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Refa Angeles</title>
    <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif;}
    body{background:#f1f5f9;color:#1e293b;}
    header{
        background:#1e5eff;
        color:white;
        padding:14px 24px;
        display:flex;
        align-items:center;
        justify-content:space-between;
        flex-wrap:wrap;
        gap:10px;
    }
    .logo-area{display:flex;align-items:center;gap:12px;}
    .logo-area img{width:42px;height:42px;object-fit:contain;border-radius:6px;}
    .logo-area h1{font-size:1.2rem;font-weight:700;}
    .header-right{display:flex;align-items:center;gap:10px;}
    .user-badge{
        color:#94a3b8;
        font-size:.9rem;
        background:#1f2937;
        padding:7px 12px;
        border-radius:7px;
    }
    .btn-back{
        background:transparent;
        color:#94a3b8;
        border:1px solid #374151;
        padding:8px 15px;
        border-radius:7px;
        cursor:pointer;
        font-size:.9rem;
        transition:.2s;
    }
    .btn-back:hover{background:#374151;color:white;}

    main{
        max-width:1600px;
        margin:0 auto;
        padding:20px;
        display:grid;
        grid-template-columns:1fr 380px;
        gap:20px;
    }
    section{
        background:white;
        border-radius:14px;
        box-shadow:0 2px 10px rgba(0,0,0,.07);
        padding:22px;
        border:1px solid #e2e8f0;
    }
    h2{font-size:1.1rem;font-weight:700;margin-bottom:16px;color:#111827;}

    .search-row{
        display:flex;
        gap:10px;
        margin-bottom:16px;
        flex-wrap:wrap;
    }
    .search-row input{
        flex:1;
        min-width:180px;
        padding:10px 14px;
        border:1px solid #cbd5e1;
        border-radius:9px;
        font-size:.95rem;
        outline:none;
    }
    .search-row input:focus{border-color:#2563eb;}
    .btn{
        border:none;
        background:#2563eb;
        color:white;
        padding:10px 20px;
        border-radius:9px;
        cursor:pointer;
        font-size:.9rem;
        font-weight:600;
        transition:.2s;
    }
    .btn:hover{background:#1d4ed8;}
    .btn-green{background:#16a34a;}
    .btn-green:hover{background:#15803d;}
    .btn-red{background:#dc2626;}
    .btn-red:hover{background:#b91c1c;}
    .btn-gray{background:#64748b;}
    .btn-gray:hover{background:#475569;}
    .btn-full{width:100%;padding:13px;font-size:1rem;border-radius:10px;}

    .table-wrap{overflow-x:auto;border-radius:9px;border:1px solid #e2e8f0;}
    table{width:100%;border-collapse:collapse;}
    thead tr{background:#1e5eff;color:white;}
    th{padding:11px 12px;font-size:.85rem;font-weight:600;white-space:nowrap;}
    td{padding:10px 12px;font-size:.88rem;border-bottom:1px solid #f1f5f9;}
    tbody tr:hover{background:#f8fafc;}
    .text-center{text-align:center;}
    .text-right{text-align:right;}

    .total-row{
        font-size:1.2rem;
        font-weight:700;
        color:#111827;
        margin:14px 0 10px;
    }
    .change-row{
        font-size:1.3rem;
        font-weight:700;
        color:#16a34a;
        margin-bottom:14px;
    }
    .divider{border:none;border-top:1px solid #e2e8f0;margin:14px 0;}
    .input-field{
        width:100%;
        padding:11px 14px;
        border:1px solid #cbd5e1;
        border-radius:9px;
        font-size:.95rem;
        outline:none;
        margin-bottom:10px;
    }
    .input-field:focus{border-color:#2563eb;}
    .btn-row{display:flex;gap:8px;margin-bottom:10px;}

    /* Modal descuento */
    .modal{
        position:fixed;inset:0;
        background:rgba(0,0,0,.5);
        display:none;justify-content:center;align-items:center;
        z-index:9999;
    }
    .modal-box{
        background:white;
        width:90%;max-width:380px;
        padding:30px;border-radius:16px;
        box-shadow:0 10px 40px rgba(0,0,0,.2);
        text-align:center;
    }
    .modal-box h3{margin-bottom:14px;font-size:1.1rem;}
    .modal-box input{
        width:100%;padding:11px;border:1px solid #cbd5e1;
        border-radius:9px;font-size:1rem;margin-bottom:14px;outline:none;
    }
    .modal-box input:focus{border-color:#2563eb;}
    .modal-btns{display:flex;gap:10px;}
    .modal-btns button{flex:1;padding:12px;border:none;border-radius:9px;cursor:pointer;font-weight:700;}

    /* Alerta personalizada */
    .toast{
        position:fixed;bottom:24px;right:24px;
        background:#111827;color:white;
        padding:14px 22px;border-radius:12px;
        font-size:.95rem;font-weight:600;
        box-shadow:0 4px 20px rgba(0,0,0,.25);
        display:none;z-index:99999;
        animation:slideIn .3s ease;
    }
    .toast.success{background:#16a34a;}
    .toast.error{background:#dc2626;}
    @keyframes slideIn{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}

    @media(max-width:900px){
        main{grid-template-columns:1fr;}
    }
    @media(max-width:500px){
        header{flex-direction:column;align-items:flex-start;}
        .header-right{width:100%;justify-content:space-between;}
    }
    </style>
</head>
<body>

<header>
    <div class="logo-area">
        <img src="3.png" alt="Logo Refa Ángeles">
        <h1>Vender</h1>
    </div>
    <div class="header-right">
        <span class="user-badge" id="userBadge">Cargando...</span>
        <button class="btn-back" onclick="regresarPanel()">← Regresar</button>
    </div>
</header>

<main>
    <!-- Búsqueda -->
    <section>
        <h2>Buscar Producto</h2>
        <div class="search-row">
            <input type="text" id="search-input" placeholder="Código, marca o nombre de pieza" />
            <button class="btn" onclick="buscarProductos()">Buscar</button>
        </div>
        <div class="table-wrap">
            <table>
                <thead>
                    <tr>
                        <th class="text-center">Código</th>
                        <th>Marca</th>
                        <th>Pieza</th>
                        <th>Modelo</th>
                        <th class="text-right">Precio</th>
                        <th class="text-center">Stock</th>
                        <th class="text-center">Acción</th>
                    </tr>
                </thead>
                <tbody id="results-tbody">
                    <tr>
                        <td colspan="7" style="padding:24px;text-align:center;color:#94a3b8;font-style:italic;">
                            Realiza una búsqueda para mostrar productos...
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </section>

    <!-- Carrito -->
    <section style="display:flex;flex-direction:column;justify-content:space-between;">
        <div>
            <h2>Carrito</h2>
            <div class="table-wrap" style="margin-bottom:12px;">
                <table>
                    <thead>
                        <tr>
                            <th>Producto</th>
                            <th class="text-center">Cant.</th>
                            <th class="text-right">Precio</th>
                            <th class="text-right">SubTotal</th>
                            <th class="text-center"></th>
                        </tr>
                    </thead>
                    <tbody id="cart-tbody">
                        <tr>
                            <td colspan="5" style="padding:18px;text-align:center;color:#94a3b8;font-style:italic;">Carrito vacío</td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <div class="total-row">Total: <span id="lbl-total">$0.00</span></div>

            <button class="btn btn-full" style="background:#7c3aed;margin-bottom:10px;" onclick="abrirDescuento()">
                Aplicar descuento
            </button>
        </div>

        <div>
            <hr class="divider">
            <input type="number" id="input-cash" class="input-field" placeholder="Dinero recibido ($)" step="0.01" min="0">
            <div class="btn-row">
                <button class="btn btn-gray" style="flex:1;" onclick="calcularCambio()">Calcular Cambio</button>
            </div>
            <div class="change-row">Cambio: <span id="lbl-change">$0.00</span></div>
            <button class="btn btn-green btn-full" onclick="finalizarVenta()">✔ Finalizar Venta</button>
        </div>
    </section>
</main>

<!-- Modal descuento -->
<div id="modal-descuento" class="modal">
    <div class="modal-box">
        <h3>Aplicar Descuento</h3>
        <input type="number" id="input-descuento" placeholder="Descuento en %" min="0" max="100" step="1">
        <div class="modal-btns">
            <button style="background:#e2e8f0;color:#334155;" onclick="cerrarDescuento()">Cancelar</button>
            <button style="background:#7c3aed;color:white;" onclick="aplicarDescuento()">Aplicar</button>
        </div>
    </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>
    
<script>

// --- Sesión ---
const usuarioActivo = JSON.parse(localStorage.getItem("activeUser"));
if(!usuarioActivo){ window.location.replace("index.html"); }
document.getElementById("userBadge").textContent = "👤 " + (usuarioActivo ? usuarioActivo.usuario : "");

let currentSearchProducts = [];
let cart = [];
let descuentoPct = 0;

function showToast(msg, tipo = "success"){
    const t = document.getElementById("toast");
    t.textContent = msg;
    t.className = "toast " + tipo;
    t.style.display = "block";
    setTimeout(() => { t.style.display = "none"; }, 3000);
}

// Búsqueda con Enter
document.getElementById("search-input").addEventListener("keydown", e => {
    if(e.key === "Enter") buscarProductos();
});

function renderResults(){
    const tbody = document.getElementById("results-tbody");
    if(currentSearchProducts.length === 0){
        tbody.innerHTML = `<tr><td colspan="7" style="padding:20px;text-align:center;color:#64748b;">Sin resultados</td></tr>`;
        return;
    }
    tbody.innerHTML = currentSearchProducts.map((prod, idx) => {
        const cartItem = cart.find(i => i.codigo_producto === prod.codigo_producto);
        const available = Number(prod.stock) - (cartItem ? cartItem.cantidad : 0);
        const sinStock = available <= 0;
        return `<tr>
            <td class="text-center">${prod.codigo_producto}</td>
            <td>${prod.marca}</td>
            <td>${prod.nombre_pieza}</td>
            <td>${Array.isArray(prod.compatibilidades) && prod.compatibilidades.length > 0 ? prod.compatibilidades.map(c => c.tipo ? `${c.tipo}: ${c.modelo}` : c.modelo).join(', ') : 'N/A'}</td>
            <td class="text-right">$${parseFloat(prod.precio).toFixed(2)}</td>
            <td class="text-center" style="color:${available <= 0 ? '#dc2626' : available <= 5 ? '#f59e0b' : '#16a34a'};font-weight:700;">${available}</td>
            <td class="text-center">
                <button class="btn btn-green" style="padding:6px 12px;font-size:.82rem;"
                    onclick="addToCart(${idx})" ${sinStock ? 'disabled style="background:#9ca3af;cursor:not-allowed;padding:6px 12px;font-size:.82rem;"' : ''}>
                    ${sinStock ? 'Sin stock' : 'Agregar'}
                </button>
            </td>
        </tr>`;
    }).join('');
}

window.addToCart = function(idx){
    const product = currentSearchProducts[idx];
    const existing = cart.find(i => i.codigo_producto === product.codigo_producto);
    const available = Number(product.stock) - (existing ? existing.cantidad : 0);

    if(available <= 0){
        showToast("Sin stock disponible", "error");
        return;
    }

    if(existing){
        existing.cantidad++;
        existing.subtotal = existing.cantidad * existing.precio;
    }else{
        cart.push({
            codigo_producto: product.codigo_producto,
            producto: product.nombre_pieza,
            cantidad: 1,
            precio: parseFloat(product.precio),
            subtotal: parseFloat(product.precio),
            originalStock: Number(product.stock)
        });
    }
    descuentoPct = 0;
    renderCart();
    renderResults();
}

function removeFromCart(idx){
    cart.splice(idx, 1);
    renderCart();
    renderResults();
}

function renderCart(){
    const tbody = document.getElementById("cart-tbody");
    if(cart.length === 0){
        tbody.innerHTML = `<tr><td colspan="5" style="padding:18px;text-align:center;color:#94a3b8;font-style:italic;">Carrito vacío</td></tr>`;
        calcularTotales();
        return;
    }
    tbody.innerHTML = cart.map((item, idx) => `
        <tr>
            <td style="font-size:.82rem;">${item.producto}</td>
            <td class="text-center">${item.cantidad}</td>
            <td class="text-right">$${item.precio.toFixed(2)}</td>
            <td class="text-right">$${item.subtotal.toFixed(2)}</td>
            <td class="text-center">
                <button onclick="removeFromCart(${idx})"
                    style="background:none;border:none;color:#dc2626;cursor:pointer;font-size:1rem;"
                    title="Quitar">✕</button>
            </td>
        </tr>
    `).join('');
    calcularTotales();
}

function calcularTotales(){
    const bruto = cart.reduce((s, i) => s + i.subtotal, 0);
    const total = bruto * (1 - descuentoPct / 100);
    document.getElementById("lbl-total").textContent = "$" + total.toFixed(2) + (descuentoPct > 0 ? ` (-${descuentoPct}%)` : "");
    return total;
}

function calcularCambio(){
    const cash = parseFloat(document.getElementById("input-cash").value);
    const total = calcularTotales();
    if(isNaN(cash)){
        showToast("Ingresa el dinero recibido", "error");
        return;
    }
    if(cash < total){
        showToast("El dinero recibido es insuficiente", "error");
        document.getElementById("lbl-change").textContent = "$0.00";
        return;
    }
    const cambio = cash - total;
    document.getElementById("lbl-change").textContent = "$" + cambio.toFixed(2);
}

function abrirDescuento(){
    document.getElementById("input-descuento").value = descuentoPct || "";
    document.getElementById("modal-descuento").style.display = "flex";
}
function cerrarDescuento(){
    document.getElementById("modal-descuento").style.display = "none";
}
function aplicarDescuento(){
    const d = parseFloat(document.getElementById("input-descuento").value);
    if(isNaN(d) || d < 0 || d > 100){
        showToast("Ingresa un descuento válido (0-100)", "error");
        return;
    }
    descuentoPct = d;
    cerrarDescuento();
    calcularTotales();
    showToast(d > 0 ? `Descuento del ${d}% aplicado` : "Descuento eliminado");
}
async function buscarProductos(){

    const query = document
        .getElementById("search-input")
        .value
        .trim();

    if(!query) return;

    const tbody = document.getElementById("results-tbody");

    tbody.innerHTML =
        `<tr><td colspan="7" style="text-align:center">Buscando...</td></tr>`;

    try{

        // El filtro .or() de PostgREST no acepta saltos de línea ni espacios
        // extra entre condiciones: deben ir en una sola línea separadas por coma.
        const { data, error } = await supabaseClient
            .from("inventario")
            .select("*")
            .or(`codigo_producto.ilike.%${query}%,marca.ilike.%${query}%,nombre_pieza.ilike.%${query}%`);

        if(error)
            throw error;

        currentSearchProducts = data || [];

        renderResults();

    }
    catch(error){

        console.error(error);

        tbody.innerHTML =
            `<tr>
                <td colspan="7"
                    style="text-align:center;color:red;">
                    Error al consultar productos.
                </td>
            </tr>`;

    }

}

async function finalizarVenta(){

    if(cart.length===0){
        showToast("Carrito vacío","error");
        return;
    }

    const efectivo=parseFloat(
        document.getElementById("input-cash").value
    );

    const total=calcularTotales();

    if(isNaN(efectivo) || efectivo<total){
        showToast("Dinero insuficiente","error");
        return;
    }

    try{

        // Registrar venta
        const { data: venta, error: ventaError } =
            await supabaseClient
    .from("ventas")
            .insert({
                usuario: usuarioActivo.usuario,
                total: total,
                efectivo: efectivo,
                cambio: efectivo-total,
                descuento: descuentoPct,
                fecha: new Date().toISOString()
            })
            .select()
            .single();

        if(ventaError)
            throw ventaError;

        // Guardar detalle y descontar inventario.
        // Se vuelve a consultar el stock directamente en Supabase para cada
        // producto (en vez de usar currentSearchProducts, que se reemplaza
        // por completo cada vez que se hace una nueva búsqueda y podría ya
        // no contener los productos que están en el carrito).
        let huboErroresParciales = false;

        for(const item of cart){

            const { error: detalleError } = await supabaseClient
              .from("detalle_ventas")
                .insert({
                    venta_id: venta.id,
                    codigo_producto: item.codigo_producto,
                    producto: item.producto,
                    cantidad: item.cantidad,
                    precio: item.precio,
                    subtotal: item.subtotal
                });

            if(detalleError){
                console.error(detalleError);
                huboErroresParciales = true;
            }

            const { data: productoActual, error: stockError } = await supabaseClient
                .from("inventario")
                .select("stock")
                .eq("codigo_producto", item.codigo_producto)
                .maybeSingle();

            if(stockError || !productoActual){
                console.error(stockError);
                huboErroresParciales = true;
                continue;
            }

            const nuevoStock = Math.max(
                0,
                Number(productoActual.stock) - item.cantidad
            );

            const { error: updateError } = await supabaseClient
                .from("inventario")
                .update({
                    stock:nuevoStock
                })
                .eq("codigo_producto",item.codigo_producto);

            if(updateError){
                console.error(updateError);
                huboErroresParciales = true;
            }

        }

        if(huboErroresParciales){
            showToast("Venta registrada, pero hubo un problema al actualizar algunos productos. Revisa el inventario.", "error");
        }else{
            showToast("Venta realizada correctamente");
        }

        imprimirTicket(
            venta.id,
            total,
            efectivo,
            efectivo-total,
            cart,
            descuentoPct
        );

        cart=[];
        descuentoPct=0;

        document.getElementById("input-cash").value="";
        document.getElementById("search-input").value="";
        document.getElementById("lbl-change").textContent="$0.00";
        document.getElementById("lbl-total").textContent="$0.00";

        currentSearchProducts=[];

        renderCart();
        renderResults();

    }
    catch(error){

        console.error(error);

        showToast(
            "Error al registrar la venta",
            "error"
        );

    }

}
    
    function imprimirTicket(ventaId, total, efectivo, cambio, carrito, descuento = 0){

    const fecha = new Date().toLocaleString("es-MX");

    let productosHTML = "";

    carrito.forEach(item => {
        productosHTML += `
            <tr>
                <td>${item.producto}</td>
                <td style="text-align:center">${item.cantidad}</td>
                <td style="text-align:right">$${item.subtotal.toFixed(2)}</td>
            </tr>
        `;
    });

    const ticket = `
    <!DOCTYPE html>
    <html>
    <head>
        <title>Ticket</title>
        <style>
            body{
                font-family: monospace;
                width:80mm;
                margin:0;
                padding:10px;
                font-size:12px;
            }
            h2,h3,p{
                text-align:center;
                margin:2px 0;
            }
            table{
                width:100%;
                border-collapse:collapse;
            }
            td{
                padding:2px 0;
            }
            hr{
                border:none;
                border-top:1px dashed #000;
                margin:6px 0;
            }
            .right{text-align:right;}
        </style>
    </head>
    <body>

        <h2>REFA ANGELES</h2>
<p><strong>Ticket de Venta</strong></p>

<p>Explanada los Jarochos, Local 2</p>
<p>Bulevard Guillermo Cházaro</p>
<p>Tlacotalpan, Veracruz</p>

<hr>

<p>${fecha}</p>

        <hr>

        <table>
            ${productosHTML}
        </table>

        <hr>

        <p>Descuento: ${descuento}%</p>
        <p>Total: $${total.toFixed(2)}</p>
        <p>Efectivo: $${efectivo.toFixed(2)}</p>
        <p>Cambio: $${cambio.toFixed(2)}</p>

        <hr>

        <h3>¡Gracias por su compra!</h3>

    </body>
    </html>
    `;

    const ventana = window.open("", "_blank");

    ventana.document.open();
    ventana.document.write(ticket);
    ventana.document.close();

    ventana.onload = () => {
        ventana.print();
        ventana.onafterprint = () => ventana.close();
    };
}

function regresarPanel(){
    if(!usuarioActivo){ window.location.href = "index.html"; return; }
    window.location.href = usuarioActivo.perfil === "admin" ? "paneladmin.html" : "panelgenerico.html";
}
</script>

    
</body>
</html>
