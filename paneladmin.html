<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">



<title>Refa Angeles</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:"Segoe UI",sans-serif;
}

body{

background:#eef3f9;
display:flex;
min-height:100vh;
color:#333;

}

/*==========================
SIDEBAR
==========================*/

.sidebar{

width:260px;

background:linear-gradient(180deg,#1e5eff,#194ddb);

color:white;

display:flex;

flex-direction:column;

padding:28px;

box-shadow:6px 0 25px rgba(0,0,0,.08);

position:fixed;

top:0;

left:0;

bottom:0;

}

.logo{
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    text-align:center;
    margin-bottom:45px;
}

.logo img{
    width:70px;
    height:70px;
    background:white;
    padding:6px;
    border-radius:16px;
    margin-bottom:15px;
}

.logo h2{
    font-size:24px;
    font-weight:700;
    white-space:nowrap;
}

.logo span{

font-size:13px;

opacity:.85;

}

nav{

display:flex;

flex-direction:column;

gap:8px;

}

.menu{

display:flex;

align-items:center;

gap:12px;

padding:15px 18px;

border-radius:12px;

text-decoration:none;

color:white;

transition:.25s;

font-weight:500;

}

.menu:hover{

background:rgba(255,255,255,.12);

transform:translateX(5px);

}

.menu.active{

background:white;

color:#1e5eff;

font-weight:700;

box-shadow:0 8px 20px rgba(0,0,0,.08);

}

.logout{

margin-top:auto;

border:none;

background:rgba(255,255,255,.12);

color:white;

padding:15px;

border-radius:12px;

font-size:15px;

cursor:pointer;

transition:.25s;

}

.logout:hover{

background:rgba(255,255,255,.25);

}

/*==========================
CONTENIDO
==========================*/

.content{

margin-left:260px;

width:calc(100% - 260px);

padding:35px;

}

/*==========================
HEADER
==========================*/

.topbar{

display:flex;

justify-content:space-between;

align-items:center;

margin-bottom:30px;

}

.topbar h1{

font-size:34px;

color:#1d3557;

}

.topbar p{

margin-top:6px;

color:#7a7a7a;

}

.profile{

display:flex;

align-items:center;

gap:12px;

background:white;

padding:12px 20px;

border-radius:50px;

box-shadow:0 8px 20px rgba(0,0,0,.05);

}

.status{

width:12px;

height:12px;

background:#2ecc71;

border-radius:50%;

}

/*==========================
TARJETAS
==========================*/

.cards{

display:grid;

grid-template-columns:repeat(3,1fr);

gap:20px;

margin-bottom:25px;

}

.stat-card{

background:white;

border-radius:20px;

padding:28px;

display:flex;

justify-content:space-between;

align-items:center;

border-left:6px solid #1e5eff;

box-shadow:0 8px 22px rgba(0,0,0,.05);

transition:.25s;

}

.stat-card:hover{

transform:translateY(-5px);

}

.stat-card small{

color:#888;

font-size:14px;

}

.stat-card h2{

margin-top:8px;

color:#1e5eff;

font-size:30px;

}

.icon{

width:70px;

height:70px;

border-radius:18px;

background:#eaf1ff;

display:flex;

justify-content:center;

align-items:center;

font-size:30px;

}

/*==========================
DASHBOARD
==========================*/

.dashboard{

display:grid;

grid-template-columns:3fr 1fr;

gap:25px;

}

.card{

background:white;

border-radius:20px;

box-shadow:0 8px 22px rgba(0,0,0,.05);

}

.chart-card{

padding:28px;

}

.chart-header{

display:flex;

justify-content:space-between;

align-items:center;

margin-bottom:20px;

}

.chart-header h3{

font-size:24px;

color:#1d3557;

}

.chart-header span{

color:#888;

font-size:14px;

}

.chart-container{

height:470px;

}

.report-card{

padding:28px;

display:flex;

flex-direction:column;

}

.report-card h3{

margin-bottom:12px;

color:#1d3557;

}

.report-card p{

line-height:1.6;

color:#666;

margin-bottom:25px;

}

.btn{

width:100%;

padding:15px;

background:#dc3545;

color:white;

border:none;

border-radius:12px;

font-size:16px;

font-weight:600;

cursor:pointer;

transition:.25s;

box-shadow:0 8px 20px rgba(220,53,69,.25);

}

.btn:hover{

background:#c82333;

transform:translateY(-2px);

box-shadow:0 10px 24px rgba(220,53,69,.35);

}

.btn:hover{

background:#194ddb;

transform:translateY(-2px);

}

.report-info{

margin-top:25px;

padding-top:20px;

border-top:1px solid #ececec;

display:flex;

flex-direction:column;

gap:18px;

}

.report-info div{

display:flex;

justify-content:space-between;

font-size:15px;

}

/*==========================
RESPONSIVE
==========================*/

@media(max-width:1000px){

.cards{

grid-template-columns:1fr;

}

.dashboard{

grid-template-columns:1fr;

}

}

@media(max-width:850px){

.sidebar{

display:none;

}

.content{

margin-left:0;

width:100%;

padding:20px;

}

.topbar{

flex-direction:column;

align-items:flex-start;

gap:15px;

}

}

</style>

</head>
<body>

    <!-- ===== SIDEBAR ===== -->

    <aside class="sidebar">

        <div class="logo">

            <img src="3.png" alt="Logo">

            <div>
                <h2>Refa Angeles</h2>
                
            </div>

        </div>

        <nav>

            <a href="#" class="menu active">
                <span>🏠</span>
                Dashboard
            </a>

            <a href="inventario.html" class="menu">
                <span>📦</span>
                Inventario
            </a>

            <a href="venta.html" class="menu">
                <span>🛒</span>
                Vender Productos
            </a>

        </nav>

        <button class="logout">
            🚪 Cerrar sesión
        </button>

    </aside>

    <!-- ===== CONTENIDO ===== -->

    <main class="content">

        <!-- HEADER -->

        <header class="topbar">

            <div>

                <h1>Panel de Administración</h1>

                
            </div>

            <div class="profile">

                <div class="status"></div>

                <strong>Administrador</strong>

            </div>

        </header>

        <!-- TARJETAS -->

        <section class="cards">

            <div class="stat-card">

                <div>

                    <small>Ventas del día</small>

                    <h2 id="ventasDia">$0</h2>

                </div>

                <div class="icon">
                    💰
                </div>

            </div>

            <div class="stat-card">

                <div>

                    <small>Ventas de la semana</small>

                    <h2 id="ventasSemana">$0</h2>

                </div>

                <div class="icon">
                    📈
                </div>

            </div>

            <div class="stat-card">

                <div>

                    <small>Ventas del mes</small>

                    <h2 id="ventasMes">$0</h2>

                </div>

                <div class="icon">
                    🏆
                </div>

            </div>

        </section>

        <!-- DASHBOARD -->

        <section class="dashboard">

            <!-- GRÁFICA -->

            <div class="card chart-card">

                <div class="chart-header">

                    <div>

                        <h3>Ventas en Tiempo Real</h3>

                        

                    </div>

                </div>

                <div class="chart-container">

                    <canvas id="salesChart"></canvas>

                </div>

            </div>

            <!-- REPORTES -->

            <div class="card report-card">

                <h3>Reportes</h3>

                <p>

                    Exporta un reporte actualizado con el resumen de ventas
                    del sistema en formato PDF

                </p>

                <button
                    class="btn"
                    onclick="generarPDF()">

                    📄 Exportar Reporte PDF

                </button>

            </div>

        </section>

            </main>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>
    
<script>

// ===============================
// VERIFICACIÓN DE SESIÓN (solo admin)
// ===============================

const usuarioActivo = JSON.parse(localStorage.getItem("activeUser"));
if(!usuarioActivo || usuarioActivo.perfil !== "admin"){
    window.location.replace("index.html");
}

// ===============================
// CERRAR SESIÓN
// ===============================

document.querySelector(".logout").addEventListener("click", () => {

    localStorage.clear();
    window.location.href = "index.html";

});

// ===============================
// DATOS INICIALES (se llenan con datos reales de Supabase)
// ===============================

const labels = [];
const ventas = [];

// ===============================
// CHART
// ===============================

const ctx = document
    .getElementById("salesChart")
    .getContext("2d");

const salesChart = new Chart(ctx, {

    type:"bar",

    data:{

        labels:labels,

        datasets:[{

            label:"Ventas",

            data:ventas,

            backgroundColor:[
                "#1e5eff",
                "#2c69ff",
                "#4379ff",
                "#5d8cff",
                "#7aa2ff",
                "#9abaff"
            ],

            borderRadius:10,

            borderSkipped:false,

            maxBarThickness:55

        }]

    },

    options:{

        responsive:true,

        maintainAspectRatio:false,

        plugins:{

            legend:{
                display:false
            },

            tooltip:{

                backgroundColor:"#1d3557",

                displayColors:false,

                callbacks:{

                    label:function(context){

                        return "$"+context.raw.toLocaleString();

                    }

                }

            }

        },

        scales:{

            x:{
                grid:{
                    display:false
                }
            },

            y:{

                beginAtZero:true,

                ticks:{

                    callback:function(value){

                        return "$"+value;

                    }

                },

                grid:{

                    color:"#e5eaf3"

                }

            }

        }

    }

});

// ===============================
// DATOS REALES DE VENTAS (tabla "ventas" en Supabase)
// ===============================

async function obtenerVentas(){

    const { data, error } = await supabaseClient
        .from("ventas")
        .select("total, fecha")
        .order("fecha", { ascending: true });

    if(error){
        console.error(error);
        return null;
    }

    return data || [];

}

function calcularResumen(ventasData){

    const ahora = new Date();

    const inicioDia = new Date(ahora.getFullYear(), ahora.getMonth(), ahora.getDate());

    const inicioSemana = new Date(inicioDia);
    inicioSemana.setDate(inicioSemana.getDate() - 6);

    const inicioMes = new Date(inicioDia);
    inicioMes.setDate(inicioMes.getDate() - 29);

    let totalDia = 0, totalSemana = 0, totalMes = 0;
    const ventasHoyPorHora = {};

    ventasData.forEach(v=>{

        const fechaVenta = new Date(v.fecha);
        const total = Number(v.total) || 0;

        if(fechaVenta >= inicioMes) totalMes += total;
        if(fechaVenta >= inicioSemana) totalSemana += total;

        if(fechaVenta >= inicioDia){

            totalDia += total;

            const hora = fechaVenta.getHours().toString().padStart(2,"0") + ":00";

            ventasHoyPorHora[hora] = (ventasHoyPorHora[hora] || 0) + total;

        }

    });

    return { totalDia, totalSemana, totalMes, ventasHoyPorHora };

}

// ===============================
// ACTUALIZACIÓN DEL DASHBOARD
// ===============================

async function actualizarDashboard(){

    const ventasData = await obtenerVentas();

    if(ventasData === null){
        return; // Ya se mostró el error en consola; no sobreescribimos la vista con ceros.
    }

    const { totalDia, totalSemana, totalMes, ventasHoyPorHora } = calcularResumen(ventasData);

    const horasOrdenadas = Object.keys(ventasHoyPorHora).sort();

    labels.length = 0;
    ventas.length = 0;

    if(horasOrdenadas.length === 0){

        labels.push(new Date().toLocaleTimeString("es-MX",{hour:"2-digit",minute:"2-digit"}));
        ventas.push(0);

    }else{

        horasOrdenadas.forEach(hora=>{
            labels.push(hora);
            ventas.push(Math.round(ventasHoyPorHora[hora]));
        });

    }

    salesChart.update();

    document.getElementById("ventasDia").textContent =
        "$"+totalDia.toLocaleString();

    document.getElementById("ventasSemana").textContent =
        "$"+totalSemana.toLocaleString();

    document.getElementById("ventasMes").textContent =
        "$"+totalMes.toLocaleString();

}

actualizarDashboard();

// Se refresca cada 30 segundos consultando Supabase (no simulado).
setInterval(actualizarDashboard, 30000);

// ===============================
// PDF
// ===============================

function generarPDF(){

    const { jsPDF } = window.jspdf;

    const doc = new jsPDF();

    doc.setFontSize(22);

    doc.setTextColor(30,94,255);

    doc.text("Refa Angeles",20,20);

    doc.setTextColor(0,0,0);

    doc.setFontSize(16);

    doc.text("Reporte General de Ventas",20,35);

    doc.setFontSize(12);

    doc.text(

        "Fecha: "+new Date().toLocaleDateString(),

        20,

        45

    );

    doc.setFontSize(13);
    doc.text("Ventas de hoy por hora:", 20, 55);

    let y=65;

    if(ventas.length === 0 || (ventas.length === 1 && ventas[0] === 0)){

        doc.setFontSize(12);
        doc.text("Sin ventas registradas hoy.", 20, y);
        y += 8;

    }else{

        doc.setFontSize(12);

        labels.forEach((hora,index)=>{

            doc.text(

                hora+"    $"+ventas[index].toLocaleString(),

                20,

                y

            );

            y+=8;

        });

    }

    y+=12;

    doc.setFontSize(14);

    doc.text(

        "Ventas del día: "+document.getElementById("ventasDia").textContent,

        20,

        y

    );

    y+=10;

    doc.text(

        "Ventas de la semana: "+document.getElementById("ventasSemana").textContent,

        20,

        y

    );

    y+=10;

    doc.text(

        "Ventas del mes: "+document.getElementById("ventasMes").textContent,

        20,

        y

    );

    doc.save("Reporte_Refa_Angeles.pdf");

}

</script>

</body>
