<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>

<title>Refa Angeles</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:"Segoe UI",sans-serif;
}

body{

background:#eef3f9;
display:flex;
min-height:100vh;
color:#333;

}

/*==========================
SIDEBAR
==========================*/

.sidebar{

width:260px;

background:linear-gradient(180deg,#1e5eff,#194ddb);

color:white;

display:flex;

flex-direction:column;

padding:28px;

box-shadow:6px 0 25px rgba(0,0,0,.08);

position:fixed;

top:0;

left:0;

bottom:0;

}

.logo{
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    text-align:center;
    margin-bottom:45px;
}

.logo img{
    width:70px;
    height:70px;
    background:white;
    padding:6px;
    border-radius:16px;
    margin-bottom:15px;
}

.logo h2{
    font-size:24px;
    font-weight:700;
    white-space:nowrap;
}

.logo span{

font-size:13px;

opacity:.85;

}

nav{

display:flex;

flex-direction:column;

gap:8px;

}

.menu{

display:flex;

align-items:center;

gap:12px;

padding:15px 18px;

border-radius:12px;

text-decoration:none;

color:white;

transition:.25s;

font-weight:500;

}

.menu:hover{

background:rgba(255,255,255,.12);

transform:translateX(5px);

}

.menu.active{

background:white;

color:#1e5eff;

font-weight:700;

box-shadow:0 8px 20px rgba(0,0,0,.08);

}

.logout{

margin-top:auto;

border:none;

background:rgba(255,255,255,.12);

color:white;

padding:15px;

border-radius:12px;

font-size:15px;

cursor:pointer;

transition:.25s;

}

.logout:hover{

background:rgba(255,255,255,.25);

}

/*==========================
CONTENIDO
==========================*/

.content{

margin-left:260px;

width:calc(100% - 260px);

padding:35px;

}

/*==========================
HEADER
==========================*/

.topbar{

display:flex;

justify-content:space-between;

align-items:center;

margin-bottom:30px;

}

.topbar h1{

font-size:34px;

color:#1d3557;

}

.topbar p{

margin-top:6px;

color:#7a7a7a;

}

.profile{

display:flex;

align-items:center;

gap:12px;

background:white;

padding:12px 20px;

border-radius:50px;

box-shadow:0 8px 20px rgba(0,0,0,.05);

}

.status{

width:12px;

height:12px;

background:#2ecc71;

border-radius:50%;

}

/*==========================
TARJETAS
==========================*/

.cards{

display:grid;

grid-template-columns:repeat(3,1fr);

gap:20px;

margin-bottom:25px;

}

.stat-card{

background:white;

border-radius:20px;

padding:28px;

display:flex;

justify-content:space-between;

align-items:center;

border-left:6px solid #1e5eff;

box-shadow:0 8px 22px rgba(0,0,0,.05);

transition:.25s;

}

.stat-card:hover{

transform:translateY(-5px);

}

.stat-card small{

color:#888;

font-size:14px;

}

.stat-card h2{

margin-top:8px;

color:#1e5eff;

font-size:30px;

}

.icon{

width:70px;

height:70px;

border-radius:18px;

background:#eaf1ff;

display:flex;

justify-content:center;

align-items:center;

font-size:30px;

}

/*==========================
DASHBOARD
==========================*/

.dashboard{

display:grid;

grid-template-columns:3fr 1fr;

gap:25px;

}

.card{

background:white;

border-radius:20px;

box-shadow:0 8px 22px rgba(0,0,0,.05);

}

.chart-card{

padding:28px;

}

.chart-header{

display:flex;

justify-content:space-between;

align-items:center;

margin-bottom:20px;

}

.chart-header h3{

font-size:24px;

color:#1d3557;

}

.chart-header span{

color:#888;

font-size:14px;

}

.chart-container{

height:470px;

}

.report-card{

padding:28px;

display:flex;

flex-direction:column;

}

.report-card h3{

margin-bottom:12px;

color:#1d3557;

}

.report-card p{

line-height:1.6;

color:#666;

margin-bottom:25px;

}

.btn{

width:100%;

padding:15px;

background:#dc3545;

color:white;

border:none;

border-radius:12px;

font-size:16px;

font-weight:600;

cursor:pointer;

transition:.25s;

box-shadow:0 8px 20px rgba(220,53,69,.25);

}

.btn:hover{

background:#c82333;

transform:translateY(-2px);

box-shadow:0 10px 24px rgba(220,53,69,.35);

}

.btn:hover{

background:#194ddb;

transform:translateY(-2px);

}

.report-info{

margin-top:25px;

padding-top:20px;

border-top:1px solid #ececec;

display:flex;

flex-direction:column;

gap:18px;

}

.report-info div{

display:flex;

justify-content:space-between;

font-size:15px;

}

/*==========================
RESPONSIVE
==========================*/

@media(max-width:1000px){

.cards{

grid-template-columns:1fr;

}

.dashboard{

grid-template-columns:1fr;

}

}

@media(max-width:850px){

.sidebar{

display:none;

}

.content{

margin-left:0;

width:100%;

padding:20px;

}

.topbar{

flex-direction:column;

align-items:flex-start;

gap:15px;

}

}

</style>

</head>
<body>

    <!-- ===== SIDEBAR ===== -->

    <aside class="sidebar">

        <div class="logo">

            <img src="3.png" alt="Logo">

            <div>
                <h2>Refa Angeles</h2>
                
            </div>

        </div>

        <nav>

            <a href="#" class="menu active">
                <span>🏠</span>
                Dashboard
            </a>

            <a href="inventario.html" class="menu">
                <span>📦</span>
                Inventario
            </a>

            <a href="venta.html" class="menu">
                <span>🛒</span>
                Vender Productos
            </a>

        </nav>

        <button class="logout">
            🚪 Cerrar sesión
        </button>

    </aside>

    <!-- ===== CONTENIDO ===== -->

    <main class="content">

        <!-- HEADER -->

        <header class="topbar">

            <div>

                <h1>Panel de Administración</h1>

                
            </div>

            <div class="profile">

                <div class="status"></div>

                <strong>Administrador</strong>

            </div>

        </header>

        <!-- TARJETAS -->

        <section class="cards">

            <div class="stat-card">

                <div>

                    <small>Ventas del día</small>

                    <h2 id="ventasDia">$0</h2>

                </div>

                <div class="icon">
                    💰
                </div>

            </div>

            <div class="stat-card">

                <div>

                    <small>Ventas de la semana</small>

                    <h2 id="ventasSemana">$0</h2>

                </div>

                <div class="icon">
                    📈
                </div>

            </div>

            <div class="stat-card">

                <div>

                    <small>Ventas del mes</small>

                    <h2 id="ventasMes">$0</h2>

                </div>

                <div class="icon">
                    🏆
                </div>

            </div>

        </section>

        <!-- DASHBOARD -->

        <section class="dashboard">

            <!-- GRÁFICA -->

            <div class="card chart-card">

                <div class="chart-header">

                    <div>

                        <h3>Ventas en Tiempo Real</h3>

                        

                    </div>

                </div>

                <div class="chart-container">

                    <canvas id="salesChart"></canvas>

                </div>

            </div>

            <!-- REPORTES -->

            <div class="card report-card">

                <h3>Reportes</h3>

                <p>

                    Exporta un reporte actualizado con el resumen de ventas
                    del sistema en formato PDF

                </p>

                <button
                    class="btn"
                    onclick="generarPDF()">

                    📄 Exportar Reporte PDF

                </button>

            </div>

        </section>

            </main>

<script>

// ===============================
// CERRAR SESIÓN
// ===============================

document.querySelector(".logout").addEventListener("click", () => {

    location.reload();

});

// ===============================
// DATOS INICIALES
// ===============================

const labels = [
    "09:00",
    "10:00",
    "11:00",
    "12:00",
    "13:00",
    "14:00"
];

const ventas = [
    1200,
    1800,
    2600,
    3100,
    3900,
    2800
];

// ===============================
// CHART
// ===============================

const ctx = document
    .getElementById("salesChart")
    .getContext("2d");

const salesChart = new Chart(ctx, {

    type:"bar",

    data:{

        labels:labels,

        datasets:[{

            label:"Ventas",

            data:ventas,

            backgroundColor:[
                "#1e5eff",
                "#2c69ff",
                "#4379ff",
                "#5d8cff",
                "#7aa2ff",
                "#9abaff"
            ],

            borderRadius:10,

            borderSkipped:false,

            maxBarThickness:55

        }]

    },

    options:{

        responsive:true,

        maintainAspectRatio:false,

        plugins:{

            legend:{
                display:false
            },

            tooltip:{

                backgroundColor:"#1d3557",

                displayColors:false,

                callbacks:{

                    label:function(context){

                        return "$"+context.raw.toLocaleString();

                    }

                }

            }

        },

        scales:{

            x:{
                grid:{
                    display:false
                }
            },

            y:{

                beginAtZero:true,

                ticks:{

                    callback:function(value){

                        return "$"+value;

                    }

                },

                grid:{

                    color:"#e5eaf3"

                }

            }

        }

    }

});

// ===============================
// ACTUALIZACIÓN AUTOMÁTICA
// ===============================

function actualizarDashboard(){

    const hora = new Date().toLocaleTimeString("es-MX",{

        hour:"2-digit",

        minute:"2-digit"

    });

    labels.push(hora);

    labels.shift();

    ventas.push(

        Math.floor(Math.random()*4500)+800

    );

    ventas.shift();

    salesChart.update();

    const totalDia = ventas.reduce((a,b)=>a+b,0);

    const totalSemana = totalDia*5;

    const totalMes = totalDia*20;

    document.getElementById("ventasDia").textContent =
        "$"+totalDia.toLocaleString();

    document.getElementById("ventasSemana").textContent =
        "$"+totalSemana.toLocaleString();

    document.getElementById("ventasMes").textContent =
        "$"+totalMes.toLocaleString();

}

actualizarDashboard();

setInterval(actualizarDashboard,3000);

// ===============================
// PDF
// ===============================

function generarPDF(){

    const { jsPDF } = window.jspdf;

    const doc = new jsPDF();

    doc.setFontSize(22);

    doc.setTextColor(30,94,255);

    doc.text("Refa Angeles",20,20);

    doc.setTextColor(0,0,0);

    doc.setFontSize(16);

    doc.text("Reporte General de Ventas",20,35);

    doc.setFontSize(12);

    doc.text(

        "Fecha: "+new Date().toLocaleDateString(),

        20,

        45

    );

    let y=60;

    labels.forEach((hora,index)=>{

        doc.text(

            hora+"    $"+ventas[index],

            20,

            y

        );

        y+=8;

    });

    y+=12;

    doc.setFontSize(14);

    doc.text(

        "Ventas del día: "+document.getElementById("ventasDia").textContent,

        20,

        y

    );

    y+=10;

    doc.text(

        "Ventas de la semana: "+document.getElementById("ventasSemana").textContent,

        20,

        y

    );

    y+=10;

    doc.text(

        "Ventas del mes: "+document.getElementById("ventasMes").textContent,

        20,

        y

    );

    doc.save("Reporte_Refa_Angeles.pdf");

}

</script>

</body>
</html>
