<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Refa Angeles</title>

<style>
*{
    box-sizing:border-box;
    margin:0;
    padding:0;
    font-family:'Segoe UI',sans-serif;
}

body{
    background:#eef3f9;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:20px;
}

/* CONTENEDOR */
.form-container{
    background:white;
    padding:40px;
    border-radius:18px;
    box-shadow:0 10px 25px rgba(0,0,0,0.08);
    width:100%;
    max-width:650px;
}

/* LOGO */
.logo{
    text-align:center;
    margin-bottom:15px;
}

.logo img{
    width:80px;
    margin-bottom:10px;
}

/* TITULO */
h2{
    color:#1d3557;
    margin-bottom:25px;
    text-align:center;
    font-size:24px;
}

.top-row{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:15px;
    margin-bottom:25px;
    flex-wrap:wrap;
}

.btn-volver{
    background:#eef3f9;
    color:#1d3557;
    border:none;
    padding:10px 18px;
    border-radius:10px;
    font-weight:600;
    cursor:pointer;
    transition:.2s;
    width:auto;
    margin-top:0;
}

.btn-volver:hover{
    background:#dde7f7;
}

/* GRID */
.form-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:15px;
}

.full-width{
    grid-column:span 2;
}

label{
    display:block;
    font-size:0.9rem;
    color:#555;
    margin-bottom:5px;
}

input,select{
    width:100%;
    padding:12px;
    border:1px solid #ddd;
    border-radius:10px;
    font-size:1rem;
    outline:none;
}

input:focus,select:focus{
    border-color:#1e5eff;
}

/* BOTÓN */
button{
    width:100%;
    padding:15px;
    background:#1e5eff;
    color:white;
    border:none;
    border-radius:10px;
    font-weight:bold;
    cursor:pointer;
    margin-top:20px;
    transition:.3s;
}

button:hover{
    background:#194ddb;
}

/* RESPONSIVE */
@media (max-width:600px){
    .form-grid{
        grid-template-columns:1fr;
    }
    .full-width{
        grid-column:span 1;
    }
    .compatibilidad{
        grid-template-columns:1fr 1fr;
    }
    .compatibilidad .modelo{
        grid-column:span 2;
    }
}

.modal{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,.5);
    justify-content:center;
    align-items:center;
    z-index:999;
}

.modal-box{
    background:white;
    padding:25px;
    border-radius:16px;
    text-align:center;
    width:320px;
    box-shadow:0 10px 30px rgba(0,0,0,.2);
}

.modal-actions{
    display:flex;
    gap:10px;
    margin-top:20px;
}

.modal-actions button{
    flex:1;
    padding:10px;
    border:none;
    border-radius:10px;
    cursor:pointer;
}

.primary{
    background:#1e5eff;
    color:white;
}

.tipo-checkboxes{
    display:flex;
    gap:20px;
    flex-wrap:wrap;
    padding:10px 0;
}

.tipo-checkboxes label{
    display:flex;
    align-items:center;
    gap:6px;
    font-weight:normal;
    cursor:pointer;
}

.tipo-checkboxes input{
    width:auto;
    cursor:pointer;
}

.compatibilidad{

    display:grid;
    grid-template-columns:1fr 2fr 1fr 1fr auto;
    gap:10px;
    margin-bottom:12px;
    align-items:center;

}

.compatibilidad button{

    width:45px;
    margin:0;
    background:#d9534f;

}

.compatibilidad button:hover{

    background:#c9302c;

}

#agregarCompatibilidad{

    width:auto;
    padding:10px 18px;

}
</style>
</head>

<body>

<div class="form-container">

    <!-- LOGO -->
    <div class="logo">
        <img src="3.png" alt="Logo Refa Angeles">
    </div>

    <div class="top-row">
        <h2 style="margin-bottom:0;text-align:left;">Agregar Nuevo Producto</h2>
        <button type="button" id="btnVolver" class="btn-volver">← Volver</button>
    </div>

    <form id="product-form">

        <div class="form-grid">

            <div>
                <label>Código del producto</label>
                <input type="text" id="codigo" required>
                <span id="codigoError" style="display:none;color:#d9534f;font-size:0.85rem;margin-top:4px;">
                    ⚠️ Este código ya está registrado.
                </span>
            </div>

            <div>
                <label>Nombre de la pieza</label>
                <input type="text" id="nombre" required>
            </div>

            <div>
                <label>Marca</label>
                <input type="text" id="marca" required>
            </div>

            <div>
                <label>Proveedor</label>
                <input type="text" id="proveedor" required>
            </div>

           <div class="full-width">

    <label>Compatibilidad con vehículos</label>

    <div id="compatibilidades">

        <div class="compatibilidad">

            <select class="tipo" required>
                <option value="" disabled selected>Tipo</option>
                <option value="Auto">Auto</option>
                <option value="Moto">Moto</option>
                <option value="Lancha">Lancha</option>
            </select>

            <input
                type="text"
                class="modelo"
                placeholder="Modelo (Ej: Nissan Sentra)"
                required>

            <input
                type="number"
                class="anio_inicio"
                placeholder="Desde">

            <input
                type="number"
                class="anio_fin"
                placeholder="Hasta">

            <button
                type="button"
                class="eliminarCompatibilidad"
                onclick="eliminarCompatibilidad(this)">
                ❌
            </button>

        </div>

    </div>

    <button
        type="button"
        id="agregarCompatibilidad"
        style="margin-top:10px;">
        ➕ Agregar otro modelo
    </button>

</div>
            <div>
                <label>Precio ($)</label>
                <input type="number" id="precio" step="0.01" required>
            </div>

            <div>
                <label>Stock inicial</label>
                <input type="number" id="stock" required>
            </div>

            <div>
                <label>Tipo (puede seleccionar varios)</label>
                <div class="tipo-checkboxes">
                    <label><input type="checkbox" class="tipoCheckbox" value="Auto"> Auto</label>
                    <label><input type="checkbox" class="tipoCheckbox" value="Motocicleta"> Motocicleta</label>
                    <label><input type="checkbox" class="tipoCheckbox" value="Lancha"> Lancha</label>
                </div>
                <span id="tipoError" style="display:none;color:#d9534f;font-size:0.85rem;margin-top:4px;">
                    ⚠️ Selecciona al menos un tipo.
                </span>
            </div>

            <!-- CATEGORÍA ACTUALIZADA -->
            <div class="full-width">
                <label>Categoría</label>
                <select id="categoria" required>

                    <option value="Químicos">Químicos</option>
                    <option value="Aceites">Aceites</option>
                    <option value="Tornillería">Tornillería</option>
                    <option value="Hules">Hules</option>
                    <option value="Refacciones">Refacciones</option>
                    <option value="Partes Eléctricas">Partes Eléctricas</option>

                </select>
            </div>

        </div>

        <button type="submit">Guardar Producto en Inventario</button>

    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>

<!-- Modal -->
<div id="modalSuccess" class="modal">
    <div class="modal-box">
        <h3>✔ Producto guardado</h3>
        <p>¿Qué deseas hacer ahora?</p>

        <div class="modal-actions">
            <button type="button" id="addAnother">➕ Agregar otro</button>
            <button type="button" id="goPanel" class="primary">🏠 Volver al panel</button>
        </div>
    </div>
</div>

<script>

    // --- Verificación de sesión ---
    const usuarioActivo = JSON.parse(localStorage.getItem("activeUser"));
    if(!usuarioActivo){
        window.location.replace("index.html");
    }

    // Solo los administradores pueden agregar productos
    if(usuarioActivo && usuarioActivo.perfil !== "admin"){
        window.location.replace("panelgenerico.html");
    }

window.addEventListener("DOMContentLoaded", () => {

    function volverAlPanel(){
        window.location.href = "paneladmin.html";
    }

    document.getElementById("btnVolver").addEventListener("click", () => {
        volverAlPanel();
    });

    document.getElementById("codigo").addEventListener("input", function(){
        document.getElementById("codigoError").style.display = "none";
        this.style.borderColor = "";
    });

   document.getElementById("product-form").addEventListener("submit", async (e) => {
    e.preventDefault();

    // Obtener todas las compatibilidades
    const compatibilidades = [];

     let datosValidos = true;

document.querySelectorAll(".compatibilidad").forEach(c => {

    const tipo = c.querySelector(".tipo").value;
    const modelo = c.querySelector(".modelo").value.trim();

    const inicioInput = c.querySelector(".anio_inicio");
    const finInput = c.querySelector(".anio_fin");

const anio_inicio = inicioInput.value ? parseInt(inicioInput.value) : null;
const anio_fin = finInput.value ? parseInt(finInput.value) : null;

// Limpiar errores anteriores
inicioInput.setCustomValidity("");
finInput.setCustomValidity("");

// Validar rango de años
if (anio_inicio > anio_fin) {
    finInput.setCustomValidity("El año final debe ser mayor o igual al año inicial.");
    finInput.reportValidity();
    datosValidos = false;
    return;
}

    compatibilidades.push({
        tipo,
        modelo,
        anio_inicio,
        anio_fin
    });

});

if (!datosValidos) {
    return;
}



const tiposSeleccionados = Array.from(
    document.querySelectorAll(".tipoCheckbox:checked")
).map(cb => cb.value);

document.getElementById("tipoError").style.display =
    tiposSeleccionados.length === 0 ? "inline-block" : "none";

if (tiposSeleccionados.length === 0) {
    return;
}

    // Crear objeto del producto
    const producto = {

        codigo_producto: document.getElementById("codigo").value,

        nombre_pieza: document.getElementById("nombre").value,

        marca: document.getElementById("marca").value,

        proveedor: document.getElementById("proveedor").value,

        compatibilidades: compatibilidades,

        precio: parseFloat(document.getElementById("precio").value),

        stock: parseInt(document.getElementById("stock").value),

        categoria: document.getElementById("categoria").value,

        tipo: tiposSeleccionados

    };

    // Ocultar mensaje de error previo antes de intentar guardar
    document.getElementById("codigoError").style.display = "none";
    document.getElementById("codigo").style.borderColor = "";

    const { error } = await supabaseClient
        .from("inventario")
        .insert([producto]);

    if (error) {

        console.error(error);

        // Código 23505 = unique_violation (el codigo_producto ya existe)
        if (error.code === "23505") {

            const codigoInput = document.getElementById("codigo");
            const codigoError = document.getElementById("codigoError");

            codigoError.style.display = "inline-block";
            codigoInput.style.borderColor = "#d9534f";
            codigoInput.focus();
            codigoInput.scrollIntoView({ behavior: "smooth", block: "center" });

        }

        return;
    }

    document.getElementById("modalSuccess").style.display = "flex";
});
    document.getElementById("addAnother").addEventListener("click", () => {

    document.getElementById("product-form").reset();

    const contenedor = document.getElementById("compatibilidades");

    // Eliminar todas las filas excepto la primera
    while (contenedor.children.length > 1) {
        contenedor.removeChild(contenedor.lastElementChild);
    }

    // Limpiar la primera fila
    const primera = contenedor.querySelector(".compatibilidad");

    primera.querySelector(".tipo").value = "";
    primera.querySelector(".modelo").value = "";
    primera.querySelector(".anio_inicio").value = "";
    primera.querySelector(".anio_fin").value = "";

    document.getElementById("modalSuccess").style.display = "none";
    document.getElementById("tipoError").style.display = "none";

});

    document.getElementById("goPanel").addEventListener("click", () => {
        volverAlPanel();
    });

    const contenedor = document.getElementById("compatibilidades");

document
.getElementById("agregarCompatibilidad")
.addEventListener("click",()=>{

    const div=document.createElement("div");

    div.className="compatibilidad";

    div.innerHTML = `
    <select class="tipo" required>
        <option value="" disabled selected>Tipo</option>
        <option value="Auto">Auto</option>
        <option value="Moto">Moto</option>
        <option value="Lancha">Lancha</option>
    </select>

    <input
        type="text"
        class="modelo"
        placeholder="Modelo (Ej: Nissan Sentra)"
        required>

    <input
        type="number"
        class="anio_inicio"
        placeholder="Desde">

    <input
        type="number"
        class="anio_fin"
        placeholder="Hasta">

    <button
        type="button"
        class="eliminarCompatibilidad"
        onclick="eliminarCompatibilidad(this)">
        ❌
    </button>
`;
    contenedor.appendChild(div);
    });
    });
      function eliminarCompatibilidad(btn){

    const lista = document.querySelectorAll(".compatibilidad");

    if(lista.length === 1){
        return;
    }

    btn.parentElement.remove();

}

    
</script>

</body>
</html>
