<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Refa Angeles</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
}

body{
    background:#f8fafc;
    min-height:100vh;
    color:#1e293b;
}

.header{
    background:#0f172a;
    color:white;
    padding:15px 30px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    box-shadow:0 4px 6px -1px rgba(0,0,0,.1);
}

.logo{
    display:flex;
    align-items:center;
    gap:15px;
}

.logo img{
    width:50px;
    height:50px;
    object-fit:contain;
}

.logo h1{
    font-size:1.4rem;
    font-weight:600;
}

.btn-logout{
    background:transparent;
    color:#94a3b8;
    border:1px solid #334155;
    padding:10px 18px;
    border-radius:8px;
    cursor:pointer;
    font-size:.95rem;
    font-weight:500;
    transition:.2s;
}

.btn-logout:hover{
    background:#ef4444;
    color:white;
    border-color:#ef4444;
}

.container{
    max-width:1250px;
    margin:auto;
    padding:40px 25px;
}

.cards{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
    gap:30px;
}

.card{
    background:white;
    border-radius:20px;
    padding:35px 30px;
    text-align:center;
    border:1px solid #f1f5f9;
    box-shadow:0 10px 25px -5px rgba(0,0,0,.05);
    transition:.3s;
}

.card:hover{
    transform:translateY(-5px);
}

.icon-wrapper{
    background:#f1f5f9;
    width:80px;
    height:80px;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    margin:0 auto 20px;
}

.icon{
    font-size:2.5rem;
}

.card h2{
    margin-bottom:12px;
}

.card p{
    color:#64748b;
    margin-bottom:25px;
    line-height:1.6;
}

.btn{
    width:100%;
    border:none;
    background:#2563eb;
    color:white;
    padding:14px;
    border-radius:12px;
    cursor:pointer;
    font-size:1rem;
    font-weight:600;
}

.btn:hover{
    background:#1d4ed8;
}

@media(max-width:768px){

    .header{
        flex-direction:column;
        gap:15px;
        text-align:center;
    }

    .cards{
        grid-template-columns:1fr;
    }

    .btn-logout{
        width:100%;
    }
}
</style>
</head>
<body>

<header class="header">
    <div class="logo">
        <img src="3.png" alt="Logo">
        <h1>Panel General</h1>
    </div>

    <button class="btn-logout" onclick="cerrarSesion()">
        Cerrar Sesión
    </button>
</header>

<div class="container">

    <div class="cards">

        <div class="card">
            <div class="icon-wrapper">
                <div class="icon">📦</div>
            </div>

            <h2>Consultar Inventario</h2>

            <p>
                Consulta existencia, precios y disponibilidad
                de productos en tiempo real
            </p>

            <button
                class="btn"
                onclick="consultarInventario()">
                Abrir Inventario
            </button>
        </div>

        <div class="card">
            <div class="icon-wrapper">
                <div class="icon">🛒</div>
            </div>

            <h2>Ventas</h2>

            <p>
                Realiza ventas de productos y genera
                comprobantes de venta
            </p>

            <button
                class="btn"
                onclick="abrirVentas()">
                Abrir Ventas
            </button>
        </div>

    </div>

</div>

<!-- Supabase -->
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<script>

/* ==================================
   CONFIGURACIÓN SUPABASE
================================== */

const SUPABASE_URL =
"https://xbfhbdxdglntubhdicln.supabase.co";

const SUPABASE_ANON_KEY =
"sb_publishable_7tENznRWZVxSBG4NWBZ5GQ_2zliMUHM";

const { createClient } = supabase;

const supabaseClient =
createClient(
    SUPABASE_URL,
    SUPABASE_ANON_KEY
);

/* ==================================
   VERIFICAR SESIÓN
================================== */

const usuario =
localStorage.getItem("activeUser");

if(!usuario){
    window.location.href = "index.html";
}

/* ==================================
   NAVEGACIÓN
================================== */

function consultarInventario(){
    window.location.href =
    "inventario.html";
}

function abrirVentas(){
    window.location.href =
    "venta.html";
}

/* ==================================
   CERRAR SESIÓN
================================== */

function cerrarSesion(){

    localStorage.removeItem("activeUser");
    localStorage.removeItem("usuarioActivo");

    window.location.replace("index.html");
}

</script>

    
</body>
</html>
