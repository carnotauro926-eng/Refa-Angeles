<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Refa Angeles</title>
<style>
*{
    margin:0;padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}
body{background:#f4f6f9;min-height:100vh;}
.header{
    background:#0f172a;
    color:white;
    padding:15px 25px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    flex-wrap:wrap;
    gap:10px;
}
.logo-lado{display:flex;align-items:center;gap:15px;}
.header img{width:55px;height:55px;object-fit:contain;}
.header h1{font-size:1.3rem;}
.btn-back{
    background:transparent;
    color:#94a3b8;
    border:1px solid #334155;
    padding:10px 18px;
    border-radius:8px;
    cursor:pointer;
    font-size:.9rem;
    font-weight:500;
    transition:.2s;
}
.btn-back:hover{background:#334155;color:white;}
.container{max-width:900px;margin:30px auto;padding:0 20px 40px;}
.card{
    background:white;
    border-radius:15px;
    padding:30px;
    box-shadow:0 4px 20px rgba(0,0,0,.09);
    margin-bottom:25px;
}
.card h2{margin-bottom:22px;color:#0f172a;font-size:1.2rem;}
.form-grid{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:18px;
}
.input-group{display:flex;flex-direction:column;}
.input-group label{
    margin-bottom:7px;
    font-weight:600;
    color:#334155;
    font-size:.92rem;
}
.input-group input,
.input-group select{
    padding:11px 14px;
    border:1px solid #cbd5e1;
    border-radius:10px;
    outline:none;
    font-size:.95rem;
    transition:.2s;
}
.input-group input:focus,
.input-group select:focus{border-color:#2563eb;}
.req{color:#dc2626;}
.btn{
    margin-top:22px;
    width:100%;
    padding:14px;
    border:none;
    border-radius:10px;
    background:#2563eb;
    color:white;
    font-size:1rem;
    font-weight:700;
    cursor:pointer;
    transition:.2s;
}
.btn:hover{background:#1d4ed8;}
.btn:disabled{background:#93c5fd;cursor:not-allowed;}

/* Modal */
.modal{
    position:fixed;inset:0;
    background:rgba(0,0,0,.55);
    display:none;justify-content:center;align-items:center;
    z-index:9999;
}
.modal-content{
    background:white;
    width:90%;max-width:420px;
    padding:35px;border-radius:20px;
    text-align:center;
    box-shadow:0 10px 40px rgba(0,0,0,.25);
    animation:subir .3s ease;
}
@keyframes subir{from{transform:translateY(25px);opacity:0;}to{transform:translateY(0);opacity:1;}}
.modal-icono{
    width:75px;height:75px;
    margin:0 auto 18px;
    border-radius:50%;
    background:#22c55e;
    color:white;
    display:flex;align-items:center;justify-content:center;
    font-size:2.2rem;font-weight:bold;
}
.modal-content h2{color:#0f172a;margin-bottom:12px;}
.modal-content p{color:#64748b;line-height:1.5;}
.modal-buttons{margin-top:22px;display:flex;gap:12px;}
.btn-modal{
    flex:1;border:none;padding:13px;border-radius:10px;
    cursor:pointer;font-weight:700;font-size:.95rem;transition:.2s;
}
.btn-agregar{background:#2563eb;color:white;}
.btn-agregar:hover{background:#1d4ed8;}
.btn-panel{background:#e2e8f0;color:#334155;}
.btn-panel:hover{background:#cbd5e1;}

@media(max-width:768px){
    .form-grid{grid-template-columns:1fr;}
    .header{flex-direction:column;align-items:flex-start;}
    .logo-lado{flex-direction:row;}
    .btn-back{width:100%;}
}
</style>
</head>
<body>

<header class="header">
    <div class="logo-lado">
        <img src="3.png" alt="Logo">
        <h1>Agregar Producto</h1>
    </div>
    <button class="btn-back" onclick="volverAlPanel()">← Volver sin guardar</button>
</header>

<div class="container">
    <div class="card">
        <h2>Registro de Producto</h2>

        <div class="form-grid">
            <div class="input-group">
                <label>Código del Producto <span class="req">*</span></label>
                <input type="text" id="codigo" placeholder="Ej. PRD-001">
            </div>
            <div class="input-group">
                <label>Categoría <span class="req">*</span></label>
                <select id="categoria">
                    <option>Químicos</option>
                    <option>Tornillería</option>
                    <option>Hules</option>
                    <option>Refacciones</option>
                    <option>Partes Eléctricas</option>
                </select>
            </div>
            <div class="input-group">
                <label>Proveedor</label>
                <input type="text" id="proveedor" placeholder="Nombre del proveedor">
            </div>
            <div class="input-group">
                <label>Marca <span class="req">*</span></label>
                <input type="text" id="marca" placeholder="Ej. Bosch">
            </div>
            <div class="input-group">
                <label>Nombre de la Pieza <span class="req">*</span></label>
                <input type="text" id="pieza" placeholder="Ej. Filtro de aceite">
            </div>
            <div class="input-group">
                <label>Modelo del Auto</label>
                <input type="text" id="modelo" placeholder="Ej. Tsuru">
            </div>
            <div class="input-group">
                <label>Año del Auto</label>
                <input type="number" id="anio" placeholder="Ej. 2015" min="1900" max="2100">
            </div>
            <div class="input-group">
                <label>Precio ($) <span class="req">*</span></label>
                <input type="number" id="precio" placeholder="0.00" min="0" step="0.01">
            </div>
            <div class="input-group">
                <label>Stock Disponible <span class="req">*</span></label>
                <input type="number" id="stock" placeholder="0" min="0" step="1">
            </div>
        </div>

        <button class="btn" id="btnGuardar" onclick="guardarProducto()">
            Guardar Producto
        </button>
    </div>
</div>

<!-- Modal éxito -->
<div id="modalGuardado" class="modal">
    <div class="modal-content">
        <div class="modal-icono">✓</div>
        <h2>Producto guardado</h2>
        <p>El producto se registró correctamente en el inventario.<br><br>¿Qué deseas hacer?</p>
        <div class="modal-buttons">
            <button class="btn-modal btn-agregar" onclick="agregarOtroProducto()">Agregar otro</button>
            <button class="btn-modal btn-panel" onclick="irAlPanel()">Ir al panel</button>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
// --- Verificar sesión admin ---
const usuarioActivo = JSON.parse(localStorage.getItem("activeUser"));
if(!usuarioActivo){ window.location.replace("index.html"); }
if(usuarioActivo && usuarioActivo.perfil !== "admin"){
    alert("Acceso solo para administradores");
    window.location.replace("panelgenerico.html");
}

// --- Supabase ---
const SUPABASE_URL = "https://xbfhbdxdglntubhdicln.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_7tENznRWZVxSBG4NWBZ5GQ_2zliMUHM";
const { createClient } = supabase;
const supabaseClient = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

async function guardarProducto(){
    const cod  = document.getElementById("codigo").value.trim();
    const cat  = document.getElementById("categoria").value;
    const prov = document.getElementById("proveedor").value.trim();
    const mar  = document.getElementById("marca").value.trim();
    const pza  = document.getElementById("pieza").value.trim();
    const mod  = document.getElementById("modelo").value.trim();
    const an   = document.getElementById("anio").value;
    const pre  = document.getElementById("precio").value;
    const stk  = document.getElementById("stock").value;

    if(!cod || !mar || !pza){
        alert("Código, Marca y Nombre de Pieza son obligatorios.");
        return;
    }
    if(!pre || parseFloat(pre) < 0){
        alert("Ingresa un precio válido.");
        return;
    }
    if(!stk || parseInt(stk) < 0){
        alert("Ingresa un stock válido.");
        return;
    }

    const btn = document.getElementById("btnGuardar");
    btn.textContent = "Guardando...";
    btn.disabled = true;

    try{
        const { error } = await supabaseClient
            .from("inventario")
            .insert([{
                codigo_producto: cod,
                categoria: cat,
                proveedor: prov,
                marca: mar,
                nombre_pieza: pza,
                modelo_auto: mod || null,
                anio: an ? parseInt(an) : null,
                precio: parseFloat(pre),
                stock: parseInt(stk)
            }]);

        if(error) throw error;

        document.getElementById("modalGuardado").style.display = "flex";

    }catch(err){
        console.error(err);
        alert("Error al guardar:\n" + (err.message.includes("unique") ? "Ya existe un producto con ese código." : err.message));
    }

    btn.textContent = "Guardar Producto";
    btn.disabled = false;
}

function limpiarFormulario(){
    ["codigo","proveedor","marca","pieza","modelo","anio","precio","stock"].forEach(id => {
        document.getElementById(id).value = "";
    });
    document.getElementById("categoria").selectedIndex = 0;
}

function agregarOtroProducto(){
    document.getElementById("modalGuardado").style.display = "none";
    limpiarFormulario();
    document.getElementById("codigo").focus();
}

function irAlPanel(){
    window.location.href = "paneladmin.html";
}

function volverAlPanel(){
    window.location.href = "paneladmin.html";
}
</script>

</body>
</html>
