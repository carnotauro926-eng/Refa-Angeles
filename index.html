<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Refa Angeles</title>
    <style>
        *{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#0f172a,#1e3a8a,#2563eb);
    overflow:hidden;
}

.main-container{
    width:1000px;
    max-width:95%;
    height:650px;
    display:flex;
    border-radius:30px;
    overflow:hidden;
    background:rgba(255,255,255,.08);
    backdrop-filter:blur(25px);
    box-shadow:0 20px 60px rgba(0,0,0,.35);
}

/* PANEL IZQUIERDO */

.welcome-panel{
    flex:1;
    background:linear-gradient(180deg,#2563eb,#1d4ed8);
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    color:white;
    padding:50px;
    position:relative;
}

.welcome-panel::before{
    content:"";
    position:absolute;
    width:350px;
    height:350px;
    border-radius:50%;
    background:rgba(255,255,255,.08);
    top:-120px;
    right:-120px;
}

.welcome-panel::after{
    content:"";
    position:absolute;
    width:250px;
    height:250px;
    border-radius:50%;
    background:rgba(255,255,255,.05);
    bottom:-80px;
    left:-80px;
}

/* LOGO GRANDE */

.welcome-logo{
    width:220px;
    height:220px;
    border-radius:30px;
    background:rgba(255,255,255,.12);
    display:flex;
    justify-content:center;
    align-items:center;
    margin-bottom:35px;
    z-index:2;
}

.welcome-logo img{
    width:180px;
    max-width:90%;
}

.welcome-title{
    font-size:3rem;
    font-weight:700;
    z-index:2;
    text-align:center;
    letter-spacing:1px;
}

.welcome-panel p{
    margin-top:20px;
    font-size:17px;
    opacity:.9;
    text-align:center;
    max-width:300px;
    z-index:2;
}

/* PANEL DERECHO */

.form-panel{
    flex:1;
    background:white;
    padding:60px;
    display:flex;
    flex-direction:column;
    justify-content:center;
}

/* BOTONES LOGIN */

.toggle-buttons{
    display:flex;
    background:#edf2ff;
    border-radius:40px;
    padding:6px;
    margin-bottom:40px;
}

.toggle-btn{
    flex:1;
    padding:15px;
    text-align:center;
    border-radius:30px;
    cursor:pointer;
    transition:.35s;
    font-weight:600;
    color:#555;
}

.toggle-btn.active{
    background:#2563eb;
    color:white;
    box-shadow:0 10px 20px rgba(37,99,235,.35);
}

/* INPUTS */

.input-group{
    margin-bottom:22px;
}

.input-field,
.select-field{
    width:100%;
    padding:17px 22px;
    border:none;
    border-radius:15px;
    background:#f3f6fb;
    font-size:16px;
    transition:.3s;
}

.input-field:focus,
.select-field:focus{
    outline:none;
    background:white;
    box-shadow:0 0 0 3px rgba(37,99,235,.2);
}

/* BOTÓN */

.submit-btn{
    margin-top:15px;
    padding:17px;
    border:none;
    border-radius:15px;
    background:linear-gradient(135deg,#2563eb,#1d4ed8);
    color:white;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
    transition:.3s;
}

.submit-btn:hover{
    transform:translateY(-3px);
    box-shadow:0 15px 30px rgba(37,99,235,.35);
}

.hidden{
    display:none;
}

@media(max-width:850px){

    .main-container{
        flex-direction:column;
        height:auto;
    }

    .welcome-panel{
        padding:40px 20px;
    }

    .welcome-logo{
        width:180px;
        height:180px;
    }

    .welcome-logo img{
        width:140px;
    }

    .welcome-title{
        font-size:2.2rem;
    }

    .form-panel{
        padding:35px;
    }

}
    </style>
</head>
<body>

    <div class="main-container">
        <div class="welcome-panel">
            <div class="welcome-logo">
                <img src="3.png" alt="Logo">
            </div>
            <div class="welcome-title">Refa Angeles</div>
        </div>

        <div class="form-panel">
            <div class="toggle-buttons">
                <div class="toggle-btn active" id="tab-login">Iniciar Sesión</div>
                <div class="toggle-btn" id="tab-register">Registro</div>
            </div>

            <form id="auth-form">
                <div class="input-group">
                    <input type="text" class="input-field" id="user" placeholder="Usuario" required>
                </div>
                <div class="input-group">
                    <input type="password" class="input-field" id="pass" placeholder="Contraseña" required>
                </div>
                <div class="input-group hidden" id="role-container">
                    <select class="select-field" id="role">
                        <option value="" disabled selected>Selecciona tu perfil</option>
                        <option value="admin">Administrador</option>
                        <option value="generico">Genérico</option>
                    </select>
                </div>
                <button type="submit" class="submit-btn" id="btn-submit">Entrar</button>
                <div id="form-message" style="margin-top:15px;font-size:14px;text-align:center;"></div>
            </form>

        </div>
    </div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>
    
    <script>
        const tabLogin = document.getElementById('tab-login');
        const tabRegister = document.getElementById('tab-register');
        const btnSubmit = document.getElementById('btn-submit');
        const roleContainer = document.getElementById('role-container');
        const roleSelect = document.getElementById('role');

        const formMessage = document.getElementById('form-message');

        function mostrarMensaje(texto, tipo){
            formMessage.textContent = texto;
            formMessage.style.color = tipo === "error" ? "#dc2626" : "#16a34a";
        }

        function limpiarMensaje(){
            formMessage.textContent = "";
        }

        tabLogin.addEventListener('click', () => {
            tabLogin.classList.add('active');
            tabRegister.classList.remove('active');
            btnSubmit.innerText = "Entrar";
            roleContainer.classList.add('hidden');
            roleSelect.removeAttribute('required');
            limpiarMensaje();
        });

        tabRegister.addEventListener('click', () => {
            tabRegister.classList.add('active');
            tabLogin.classList.remove('active');
            btnSubmit.innerText = "Registrar";
            roleContainer.classList.remove('hidden');
            roleSelect.setAttribute('required', 'required');
            limpiarMensaje();
        });

       document.getElementById("auth-form").addEventListener("submit", async (e) => {
    e.preventDefault();

    limpiarMensaje();

    const isLogin = tabLogin.classList.contains("active");

    const payload = {
        user: document.getElementById("user").value.trim(),
        pass: document.getElementById("pass").value,
        role: isLogin ? null : document.getElementById("role").value
    };

    if (!payload.user || !payload.pass || (!isLogin && !payload.role)) {
        mostrarMensaje("Completa todos los campos.", "error");
        return;
    }

    btnSubmit.disabled = true;

    try {

        if (isLogin) {

            const { data, error } = await supabaseClient
                .from("usuarios")
                .select("*")
                .eq("usuario", payload.user)
                .eq("contrasena", payload.pass)
                .maybeSingle();

            if (error) {
                console.error(error);
                mostrarMensaje("Ocurrió un error al iniciar sesión. Intenta de nuevo.", "error");
                return;
            }

            if (!data) {
                mostrarMensaje("Usuario o contraseña incorrectos.", "error");
                return;
            }

            localStorage.setItem("activeUser", JSON.stringify(data));
            localStorage.setItem("perfil", data.perfil);

            if (data.perfil === "admin") {
                window.location.href = "paneladmin.html";
            } else {
                window.location.href = "panelgenerico.html";
            }

        } else {

            // Verificar si el usuario ya existe
            const { data: existe, error: errorExiste } = await supabaseClient
                .from("usuarios")
                .select("id")
                .eq("usuario", payload.user)
                .maybeSingle();

            if (errorExiste) {
                console.error(errorExiste);
                mostrarMensaje("Ocurrió un error al validar el usuario.", "error");
                return;
            }

            if (existe) {
                mostrarMensaje("Ese usuario ya existe, elige otro.", "error");
                return;
            }

            // Registrar usuario
            const { error } = await supabaseClient
                .from("usuarios")
                .insert([
                    {
                        usuario: payload.user,
                        contrasena: payload.pass,
                        perfil: payload.role
                    }
                ]);

            if (error) {
                console.error(error);
                mostrarMensaje("Ocurrió un error al registrar el usuario.", "error");
                return;
            }

            // Volver al formulario de inicio de sesión
            tabLogin.click();
            document.getElementById("auth-form").reset();
            mostrarMensaje("Cuenta creada. Ya puedes iniciar sesión.", "success");
        }

    } finally {
        btnSubmit.disabled = false;
    }
});
    </script>
</body>
</html>
