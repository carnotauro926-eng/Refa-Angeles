<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Refa Angeles</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"Segoe UI",sans-serif;
}

body{
    background:#eef3f9;
    display:flex;
    min-height:100vh;
}

/* ======================
   SIDEBAR
====================== */

aside{
    width:260px;
    background:linear-gradient(180deg,#1e5eff,#194ddb);
    color:white;
    display:flex;
    flex-direction:column;
    padding:30px;
}

.logo{
    text-align:center;
    margin-bottom:50px;
}

.logo img{
    width:85px;
    margin-bottom:15px;
}

.logo h2{
    font-size:24px;
}

.menu-item{
    padding:16px;
    border-radius:12px;
    cursor:pointer;
    transition:.3s;
    font-weight:500;
}

.menu-item:hover{
    background:rgba(255,255,255,.15);
}

.salir{
    margin-top:auto;
}

/* ======================
   CONTENIDO
====================== */

main{
    flex:1;
    padding:40px;
}

.topbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:25px;
}

.title{
    font-size:28px;
    color:#1d3557;
    font-weight:600;
}

button{
    background:#1e5eff;
    color:white;
    border:none;
    padding:10px 18px;
    border-radius:10px;
    cursor:pointer;
    transition:.2s;
}

button:hover{
    background:#194ddb;
}

.panel{
    background:white;
    border-radius:18px;
    padding:25px;
    box-shadow:0 10px 25px rgba(0,0,0,.05);
}

/* ======================
   CONTROLES
====================== */

.controls{
    display:flex;
    gap:12px;
    margin-bottom:20px;
    flex-wrap:wrap;
}

.search{
    flex:1;
    min-width:220px;
    padding:12px;
    border-radius:12px;
    border:2px solid #e6eeff;
    background:#f9fbff;
    outline:none;
}

.search:focus{
    border-color:#1e5eff;
    background:white;
}

select{
    padding:12px;
    border-radius:12px;
    border:2px solid #e6eeff;
    background:#f9fbff;
}

/* ======================
   TABLA
====================== */

table{
    width:100%;
    border-collapse:collapse;
}

thead{
    background:#1e5eff;
    color:white;
}

th,
td{
    padding:14px;
    border-bottom:1px solid #eef2ff;
}

tbody tr:hover{
    background:#f3f7ff;
}

/* ======================
   STOCK
====================== */

.badge{
    background:#e8f0ff;
    color:#1e5eff;
    padding:5px 10px;
    border-radius:999px;
    font-weight:600;
}

.warning{
    display:none;
    margin-top:5px;
    padding:4px 10px;
    background:#ff3b3b;
    color:white;
    font-size:.75rem;
    border-radius:999px;
}

.low-stock{
    background:#ffecec !important;
}

/* ======================
   BOTONES
====================== */

.actions{
    display:flex;
    gap:6px;
}

.actions button{
    padding:6px 10px;
    font-size:.8rem;
}

.delete{
    background:#ff3b3b;
    color:white;
}

/* ======================
   MODAL
====================== */

.modal{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.5);
    justify-content:center;
    align-items:center;
    z-index:999;
}

.modal-box{
    background:white;
    padding:25px;
    border-radius:16px;
    width:320px;
    text-align:center;
}

.modal-actions{
    display:flex;
    gap:10px;
    margin-top:20px;
}

.modal-actions button{
    flex:1;
}

.danger{
    background:#ff3b3b;
}

#cancelDelete,
#cancelEdit{
    background:#ddd;
    color:black;
}

</style>

</head>

<body>

<aside>

    <div class="logo">
        <img src="3.png" alt="Logo">
        <h2>Refa Angeles</h2>
    </div>

    <div class="menu-item" id="menuAgregarProducto" onclick="location.href='agregarproducto.html'">
        ➕ Agregar producto
    </div>

    <div class="menu-item salir" onclick="cerrarSesion()">
        🚪 Cerrar sesión
    </div>

</aside>

<main>

<div class="topbar">

    <div class="title">
        Inventario
    </div>

    <button id="backBtn">
        Volver
    </button>

</div>

<div class="panel">

<div class="controls">

<input
class="search"
id="search"
placeholder="Buscar producto...">

<select id="categoryFilter">

<option value="">Todas las categorías</option>
<option value="Químicos">Químicos</option>
<option value="Aceites">Aceites</option>
<option value="Tornillería">Tornillería</option>
<option value="Hules">Hules</option>
<option value="Refacciones">Refacciones</option>
<option value="Partes Eléctricas">Partes Eléctricas</option>

</select>

</div>

<table>

<thead>

<tr>

<th>Código</th>
<th>Pieza</th>
<th>Marca</th>
<th>Modelo</th>
<th>Proveedor</th>
<th>Stock</th>
<th>Precio</th>
<th>Acciones</th>

</tr>

</thead>

<tbody id="inventory-body">

</tbody>

</table>

</div>

</main>

<!-- MODAL -->

<div id="modalDelete" class="modal">

<div class="modal-box">

<h3>¿Eliminar producto?</h3>

<div class="modal-actions">

<button
type="button"
id="cancelDelete">
Cancelar
</button>

<button
type="button"
id="confirmDelete"
class="danger">
Eliminar
</button>

</div>

</div>

</div>

    <div id="modalEdit" class="modal">

    <div class="modal-box">

        <h3>Editar producto</h3>

        <br>

        <label>Precio</label>

        <input
            type="number"
            id="editPrecio"
            step="0.01"
            style="width:100%;padding:10px;margin-top:5px;border-radius:8px;border:1px solid #ccc;">

        <br><br>

        <label>Entrada (Stock)</label>

        <input
            type="number"
            id="editStock"
            style="width:100%;padding:10px;margin-top:5px;border-radius:8px;border:1px solid #ccc;">

        <div class="modal-actions">

            <button id="cancelEdit">
                Cancelar
            </button>

            <button id="saveEdit">
                Guardar
            </button>

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>

<script>

    // --- Verificación de sesión ---
    const usuarioActivo = JSON.parse(localStorage.getItem("activeUser"));
    if(!usuarioActivo){
        window.location.replace("index.html");
    }

    // Solo los administradores pueden ver el acceso a "Agregar producto"
    if(usuarioActivo && usuarioActivo.perfil !== "admin"){
        document.getElementById("menuAgregarProducto").style.display = "none";
    }

const tbody = document.getElementById("inventory-body");
const search = document.getElementById("search");
const category = document.getElementById("categoryFilter");

const modalDelete = document.getElementById("modalDelete");
const cancelDelete = document.getElementById("cancelDelete");
const confirmDelete = document.getElementById("confirmDelete");

let rowToDelete = null;

const modalEdit = document.getElementById("modalEdit");
const editPrecio = document.getElementById("editPrecio");
const editStock = document.getElementById("editStock");

const cancelEdit = document.getElementById("cancelEdit");
const saveEdit = document.getElementById("saveEdit");

let rowToEdit = null;

/* ==========================
   FORMATEAR COMPATIBILIDADES
========================== */

function formatCompatibilidades(compatibilidades){

    if(!compatibilidades || !Array.isArray(compatibilidades) || compatibilidades.length === 0){
        return "N/A";
    }

    return compatibilidades.map(c => {
        let texto = c.modelo || "";
        if(c.anio_inicio && c.anio_fin){
            texto += ` (${c.anio_inicio}-${c.anio_fin})`;
        } else if(c.anio_inicio){
            texto += ` (${c.anio_inicio}+)`;
        }
        return texto;
    }).join(", ");
}

/* ==========================
   CARGAR INVENTARIO
========================== */

async function cargarInventario(){

    const { data, error } = await supabaseClient
        .from("inventario")
        .select("*")
        .order("id", { ascending:false });

    console.log("DATA:", data);
    console.log("ERROR:", error);

    if(error){
        console.error(error);
        return;
    }

    tbody.innerHTML = "";

    data.forEach(producto=>{

        tbody.innerHTML += `
        <tr data-category="${producto.categoria}" data-id="${producto.id}">

            <td>${producto.codigo_producto}</td>

            <td>${producto.nombre_pieza}</td>

            <td>${producto.marca}</td>

            <td>${formatCompatibilidades(producto.compatibilidades)}</td>

            <td>${producto.proveedor}</td>

            <td>

                <span
                    class="badge stock"
                    data-stock="${producto.stock}">
                    ${producto.stock}
                </span>

                <span class="warning">
                    Stock bajo
                </span>

            </td>

            <td>$${producto.precio}</td>

            <td class="actions">

    <button
        onclick="editRow(this)">
        Editar
    </button>

    <button
        class="delete"
        onclick="deleteRow(this)">
        Eliminar
    </button>

</td>

        </tr>
        `;

    });

    checkStock();

}

cargarInventario();

/* ==========================
   BUSCADOR
========================== */

search.addEventListener("input", filterTable);
category.addEventListener("change", filterTable);

function filterTable(){

    const texto = search.value.toLowerCase();
    const categoria = category.value.toLowerCase();

    document.querySelectorAll("#inventory-body tr").forEach(row=>{

        const contenido = row.innerText.toLowerCase();
        const cat = row.dataset.category.toLowerCase();

        const coincideTexto = contenido.includes(texto);
        const coincideCategoria =
            categoria === "" || cat === categoria;

        row.style.display =
            coincideTexto && coincideCategoria
            ? ""
            : "none";

    });

}
    /* ==========================
   STOCK BAJO
========================== */

function checkStock(){

    document.querySelectorAll("#inventory-body tr").forEach(row=>{

        const badge = row.querySelector(".stock");

        if(!badge) return;

        const stock = parseInt(badge.dataset.stock);

        const warning = row.querySelector(".warning");

        if(stock <= 3){

            row.classList.add("low-stock");
            warning.style.display = "inline-block";

        }else{

            row.classList.remove("low-stock");
            warning.style.display = "none";

        }

    });

}

/* ==========================
   BOTÓN VOLVER
========================== */

document.getElementById("backBtn").addEventListener("click",()=>{

    const perfil = localStorage.getItem("perfil");

    if(perfil === "admin"){
        location.href = "paneladmin.html";
    }else{
        location.href = "panelgenerico.html";
    }

});

/* ==========================
   MODAL ELIMINAR
========================== */

function deleteRow(btn){

    rowToDelete = btn.closest("tr");

    modalDelete.style.display = "flex";

}

cancelDelete.addEventListener("click",()=>{

    modalDelete.style.display = "none";
    rowToDelete = null;

});

confirmDelete.addEventListener("click", async ()=>{

    if(rowToDelete){

        const id = rowToDelete.dataset.id;

        confirmDelete.disabled = true;

        const { error } = await supabaseClient
            .from("inventario")
            .delete()
            .eq("id", id);

        confirmDelete.disabled = false;

        if(error){
            console.error(error);
            modalDelete.style.display = "none";
            return;
        }

        rowToDelete.remove();
        rowToDelete = null;

    }

    modalDelete.style.display = "none";

});

modalDelete.addEventListener("click",(e)=>{

    if(e.target === modalDelete){

        modalDelete.style.display = "none";
        rowToDelete = null;

    }

});

    function editRow(btn){

    rowToEdit = btn.closest("tr");

    const precioTexto = rowToEdit.children[6].innerText.replace("$","");

    const stockTexto =
        rowToEdit.querySelector(".stock").innerText;

    editPrecio.value = precioTexto;
    editStock.value = stockTexto;

    modalEdit.style.display = "flex";

}
    cancelEdit.addEventListener("click", () => {

    modalEdit.style.display = "none";
    rowToEdit = null;

});
    saveEdit.addEventListener("click", async () => {

    if (!rowToEdit) return;

    const id = rowToEdit.dataset.id;

    const nuevoPrecio = parseFloat(editPrecio.value);
    const nuevoStock = parseInt(editStock.value);

    saveEdit.disabled = true;

    const { error } = await supabaseClient
        .from("inventario")
        .update({
            precio: nuevoPrecio,
            stock: nuevoStock
        })
        .eq("id", id);

    saveEdit.disabled = false;

    if (error) {
        console.error(error);
        return;
    }

    modalEdit.style.display = "none";
    rowToEdit = null;

    cargarInventario();

});
    modalEdit.addEventListener("click", (e) => {

    if (e.target === modalEdit) {

        modalEdit.style.display = "none";
        rowToEdit = null;

    }

});

/* ==========================
   CERRAR SESIÓN
========================== */

function cerrarSesion(){

    localStorage.clear();
    location.href = "index.html";

}

    
</script>
</body>

</html>
