<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Refa Angeles</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"Segoe UI",sans-serif;
}

body{
    background:#eef3f9;
    display:flex;
    min-height:100vh;
}

aside{
    width:260px;
    background:linear-gradient(180deg,#1e5eff,#194ddb);
    color:white;
    display:flex;
    flex-direction:column;
    padding:30px;
}

.logo{
    text-align:center;
    margin-bottom:50px;
}

.logo img{
    width:85px;
    margin-bottom:15px;
}

.logo h2{
    font-size:24px;
}

.menu-item{
    padding:16px;
    border-radius:12px;
    cursor:pointer;
    transition:.3s;
    font-weight:500;
}

.menu-item:hover{
    background:rgba(255,255,255,.15);
}

.salir{
    margin-top:auto;
}

main{
    flex:1;
    padding:40px;
}

.topbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:25px;
}

.title{
    font-size:28px;
    color:#1d3557;
    font-weight:600;
}

button{
    background:#1e5eff;
    color:white;
    border:none;
    padding:10px 18px;
    border-radius:10px;
    cursor:pointer;
    transition:.2s;
}

button:hover{
    background:#194ddb;
}

.panel{
    background:white;
    border-radius:18px;
    padding:25px;
    box-shadow:0 10px 25px rgba(0,0,0,.05);
}

.controls{
    display:flex;
    gap:12px;
    margin-bottom:20px;
    flex-wrap:wrap;
}

.search{
    flex:1;
    min-width:220px;
    padding:12px;
    border-radius:12px;
    border:2px solid #e6eeff;
    background:#f9fbff;
    outline:none;
}

.search:focus{
    border-color:#1e5eff;
    background:white;
}

select{
    padding:12px;
    border-radius:12px;
    border:2px solid #e6eeff;
    background:#f9fbff;
}

table{
    width:100%;
    border-collapse:collapse;
}

thead{
    background:#1e5eff;
    color:white;
}

th,
td{
    padding:14px;
    border-bottom:1px solid #eef2ff;
}

tbody tr:hover{
    background:#f3f7ff;
}

.badge{
    background:#e8f0ff;
    color:#1e5eff;
    padding:5px 10px;
    border-radius:999px;
    font-weight:600;
}

.warning{
    display:none;
    margin-top:5px;
    padding:4px 10px;
    background:#ff3b3b;
    color:white;
    font-size:.75rem;
    border-radius:999px;
}

.low-stock{
    background:#ffecec !important;
}

.actions{
    display:flex;
    gap:6px;
}

.actions button{
    padding:6px 10px;
    font-size:.8rem;
}

.delete{
    background:#ff3b3b;
    color:white;
}

.modal{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.5);
    justify-content:center;
    align-items:center;
    z-index:999;
}

.modal-box{
    background:white;
    padding:25px;
    border-radius:16px;
    width:560px;
    max-width:92vw;
    max-height:88vh;
    overflow-y:auto;
    text-align:left;
}

.modal-box h3{
    text-align:center;
}

.edit-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:14px;
    margin-top:10px;
}

.edit-grid label{
    display:block;
    font-size:0.85rem;
    color:#555;
    margin-bottom:5px;
}

.edit-grid input,
.edit-grid select{
    width:100%;
    padding:10px;
    border-radius:8px;
    border:1px solid #ccc;
    box-sizing:border-box;
}

.edit-full{
    grid-column:span 2;
}

.tipo-checkboxes{
    display:flex;
    gap:18px;
    flex-wrap:wrap;
    padding:5px 0;
}

.tipo-checkboxes label{
    display:flex;
    align-items:center;
    gap:6px;
    font-weight:normal;
    cursor:pointer;
    font-size:0.9rem;
}

.tipo-checkboxes input{
    width:auto;
    cursor:pointer;
}

.compatibilidad{
    display:grid;
    grid-template-columns:2fr 1fr 1fr auto;
    gap:10px;
    margin-bottom:10px;
    align-items:center;
}

.compatibilidad input,
.compatibilidad select{
    width:100%;
    padding:10px;
    border-radius:8px;
    border:1px solid #ccc;
    box-sizing:border-box;
}

.compatibilidad button{
    width:40px;
    margin:0;
    padding:10px 0;
    background:#d9534f;
}

.compatibilidad button:hover{
    background:#c9302c;
}

@media (max-width:600px){
    .edit-grid{
        grid-template-columns:1fr;
    }
    .edit-full{
        grid-column:span 1;
    }
    .compatibilidad{
        grid-template-columns:1fr 1fr;
    }
    .compatibilidad .modeloEdit{
        grid-column:span 2;
    }
}

.modal-actions{
    display:flex;
    gap:10px;
    margin-top:20px;
}

.modal-actions button{
    flex:1;
}

.danger{
    background:#ff3b3b;
}

#cancelDelete,
#cancelEdit{
    background:#ddd;
    color:black;
}

</style>

</head>

<body>

<aside>

    <div class="logo">
        <img src="3.png" alt="Logo">
        <h2>Refa Angeles</h2>
    </div>

    <div class="menu-item" id="menuAgregarProducto" onclick="location.href='agregarproducto.html'">
        ➕ Agregar producto
    </div>

    <div class="menu-item salir" onclick="cerrarSesion()">
        🚪 Cerrar sesión
    </div>

</aside>

<main>

<div class="topbar">

    <div class="title">
        Inventario
    </div>

    <button id="backBtn">
        Volver
    </button>

</div>

<div class="panel">

<div class="controls">

<input
class="search"
id="search"
placeholder="Buscar producto...">

<select id="categoryFilter">

<option value="">Todas las categorías</option>
<option value="Químicos">Químicos</option>
<option value="Aceites">Aceites</option>
<option value="Tornillería">Tornillería</option>
<option value="Hules">Hules</option>
<option value="Refacciones">Refacciones</option>
<option value="Partes Eléctricas">Partes Eléctricas</option>

</select>

<select id="tipoFilter">

<option value="">Todos los tipos</option>
<option value="Auto">Auto</option>
<option value="Motocicleta">Motocicleta</option>
<option value="Lancha">Lancha</option>

</select>

</div>

<table>

<thead>

<tr>

<th>Código</th>
<th>Pieza</th>
<th>Marca</th>
<th>Tipo</th>
<th>Modelo</th>
<th>Proveedor</th>
<th>Stock</th>
<th>Precio</th>
<th>Acciones</th>

</tr>

</thead>

<tbody id="inventory-body">

</tbody>

</table>

</div>

</main>

<!-- MODAL -->

<div id="modalDelete" class="modal">

<div class="modal-box">

<h3>¿Eliminar producto?</h3>

<div class="modal-actions">

<button
type="button"
id="cancelDelete">
Cancelar
</button>

<button
type="button"
id="confirmDelete"
class="danger">
Eliminar
</button>

</div>

</div>

</div>

    <div id="modalEdit" class="modal">

    <div class="modal-box">

        <h3>Editar producto</h3>

        <div class="edit-grid">

            <div class="edit-full">
                <label>Código (no editable)</label>
                <input type="text" id="editCodigo" disabled style="background:#f1f5f9;color:#64748b;">
            </div>

            <div>
                <label>Nombre de la pieza</label>
                <input type="text" id="editNombre">
            </div>

            <div>
                <label>Marca</label>
                <input type="text" id="editMarca">
            </div>

            <div>
                <label>Proveedor</label>
                <input type="text" id="editProveedor">
            </div>

            <div class="edit-full">
                <label>Tipo (puede seleccionar varios)</label>
                <div class="tipo-checkboxes">
                    <label><input type="checkbox" class="editTipoCheckbox" value="Auto"> Auto</label>
                    <label><input type="checkbox" class="editTipoCheckbox" value="Motocicleta"> Motocicleta</label>
                    <label><input type="checkbox" class="editTipoCheckbox" value="Lancha"> Lancha</label>
                </div>
            </div>

            <div>
                <label>Categoría</label>
                <select id="editCategoria">
                    <option value="Químicos">Químicos</option>
                    <option value="Aceites">Aceites</option>
                    <option value="Tornillería">Tornillería</option>
                    <option value="Hules">Hules</option>
                    <option value="Refacciones">Refacciones</option>
                    <option value="Partes Eléctricas">Partes Eléctricas</option>
                </select>
            </div>

            <div class="edit-full">
                <label>Compatibilidad con vehículos</label>
                <div id="compatibilidadesEdit"></div>
                <button
                    type="button"
                    id="agregarCompatibilidadEdit"
                    style="margin-top:5px;width:auto;padding:8px 16px;">
                    ➕ Agregar otro modelo
                </button>
            </div>

            <div>
                <label>Precio</label>
                <input type="number" id="editPrecio" step="0.01">
            </div>

            <div>
                <label>Entrada (Stock)</label>
                <input type="number" id="editStock">
            </div>

        </div>

        <div class="modal-actions">

            <button id="cancelEdit">
                Cancelar
            </button>

            <button id="saveEdit">
                Guardar
            </button>

        </div>

    </div>

</div>

<!-- MODAL MENSAJES -->

<div id="modalMensaje" class="modal">

    <div class="modal-box" style="max-width:420px;text-align:center;">

        <h3 id="tituloMensaje">Mensaje</h3>

        <p id="textoMensaje" style="margin:20px 0;font-size:16px;"></p>

        <button id="cerrarMensaje">
            Aceptar
        </button>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>

<script>

    // --- Verificación de sesión ---
    const usuarioActivo = JSON.parse(localStorage.getItem("activeUser"));
    if(!usuarioActivo){
        window.location.replace("index.html");
    }

    // Solo los administradores pueden ver el acceso a "Agregar producto"
    if(usuarioActivo && usuarioActivo.perfil !== "admin"){
        document.getElementById("menuAgregarProducto").style.display = "none";
    }

const tbody = document.getElementById("inventory-body");
const search = document.getElementById("search");
const category = document.getElementById("categoryFilter");
const tipoFilterSelect = document.getElementById("tipoFilter");

const modalDelete = document.getElementById("modalDelete");
const cancelDelete = document.getElementById("cancelDelete");
const confirmDelete = document.getElementById("confirmDelete");

let rowToDelete = null;
let productosCache = [];

const modalEdit = document.getElementById("modalEdit");
const editCodigo = document.getElementById("editCodigo");
const editNombre = document.getElementById("editNombre");
const editMarca = document.getElementById("editMarca");
const editProveedor = document.getElementById("editProveedor");
const editCategoria = document.getElementById("editCategoria");
const compatibilidadesEditContainer = document.getElementById("compatibilidadesEdit");
const editPrecio = document.getElementById("editPrecio");
const editStock = document.getElementById("editStock");

const cancelEdit = document.getElementById("cancelEdit");
const saveEdit = document.getElementById("saveEdit");

let rowToEdit = null;

// ==========================
// MODAL DE MENSAJES
// ==========================

const modalMensaje = document.getElementById("modalMensaje");
const tituloMensaje = document.getElementById("tituloMensaje");
const textoMensaje = document.getElementById("textoMensaje");
const cerrarMensaje = document.getElementById("cerrarMensaje");

function mostrarMensaje(titulo, mensaje){

    tituloMensaje.textContent = titulo;
    textoMensaje.textContent = mensaje;

    modalMensaje.style.display = "flex";

}

cerrarMensaje.addEventListener("click",()=>{

    modalMensaje.style.display="none";

});

modalMensaje.addEventListener("click",(e)=>{

    if(e.target===modalMensaje){
        modalMensaje.style.display="none";
    }

});

/* ==========================
   FORMATEAR COMPATIBILIDADES
========================== */

function formatCompatibilidades(compatibilidades){

    if(!compatibilidades || !Array.isArray(compatibilidades) || compatibilidades.length === 0){
        return "N/A";
    }

    return compatibilidades.map(c => {
        let texto = c.tipo ? `${c.tipo}: ${c.modelo || ""}` : (c.modelo || "");
        if(c.anio_inicio && c.anio_fin){
            texto += ` (${c.anio_inicio}-${c.anio_fin})`;
        } else if(c.anio_inicio){
            texto += ` (${c.anio_inicio}+)`;
        }
        return texto;
    }).join(", ");
}

/* ==========================
   CARGAR INVENTARIO
========================== */

async function cargarInventario(){

    const { data, error } = await supabaseClient
        .from("inventario")
        .select("*")
        .order("id", { ascending:false });

    console.log("DATA:", data);
    console.log("ERROR:", error);

    if(error){
        console.error(error);
        return;
    }

    productosCache = data;

    tbody.innerHTML = "";

    data.forEach(producto=>{

        tbody.innerHTML += `
        <tr data-category="${producto.categoria}" data-tipo="${Array.isArray(producto.tipo) ? producto.tipo.join(',') : (producto.tipo || '')}" data-id="${producto.id}">

            <td>${producto.codigo_producto}</td>

            <td>${producto.nombre_pieza}</td>

            <td>${producto.marca}</td>

            <td>${Array.isArray(producto.tipo) && producto.tipo.length > 0 ? producto.tipo.join(', ') : 'N/A'}</td>

            <td>${formatCompatibilidades(producto.compatibilidades)}</td>

            <td>${producto.proveedor}</td>

            <td>

                <span
                    class="badge stock"
                    data-stock="${producto.stock}">
                    ${producto.stock}
                </span>

                <span class="warning">
                    Stock bajo
                </span>

            </td>

            <td>$${producto.precio}</td>

            <td class="actions">

    <button
        onclick="editRow(this)">
        Editar
    </button>

    <button
        class="delete"
        onclick="deleteRow(this)">
        Eliminar
    </button>

</td>

        </tr>
        `;

    });

    checkStock();

}

cargarInventario();

/* ==========================
   BUSCADOR
========================== */

search.addEventListener("input", filterTable);
category.addEventListener("change", filterTable);
tipoFilterSelect.addEventListener("change", filterTable);

function filterTable(){

    const texto = search.value.toLowerCase();
    const categoria = category.value.toLowerCase();
    const tipo = tipoFilterSelect.value.toLowerCase();

    document.querySelectorAll("#inventory-body tr").forEach(row=>{

        const contenido = row.innerText.toLowerCase();
        const cat = row.dataset.category.toLowerCase();
        const rowTipos = (row.dataset.tipo || "").toLowerCase().split(",").map(t => t.trim());

        const coincideTexto = contenido.includes(texto);
        const coincideCategoria =
            categoria === "" || cat === categoria;
        const coincideTipo =
            tipo === "" || rowTipos.includes(tipo);

        row.style.display =
            coincideTexto && coincideCategoria && coincideTipo
            ? ""
            : "none";

    });

}
    /* ==========================
   STOCK BAJO
========================== */

function checkStock(){

    document.querySelectorAll("#inventory-body tr").forEach(row=>{

        const badge = row.querySelector(".stock");

        if(!badge) return;

        const stock = parseInt(badge.dataset.stock);

        const warning = row.querySelector(".warning");

        if(stock <= 3){

            row.classList.add("low-stock");
            warning.style.display = "inline-block";

        }else{

            row.classList.remove("low-stock");
            warning.style.display = "none";

        }

    });

}

/* ==========================
   BOTÓN VOLVER
========================== */

document.getElementById("backBtn").addEventListener("click",()=>{

    const perfil = localStorage.getItem("perfil");

    if(perfil === "admin"){
        location.href = "paneladmin.html";
    }else{
        location.href = "panelgenerico.html";
    }

});

/* ==========================
   MODAL ELIMINAR
========================== */

function deleteRow(btn){

    rowToDelete = btn.closest("tr");

    modalDelete.style.display = "flex";

}

cancelDelete.addEventListener("click",()=>{

    modalDelete.style.display = "none";
    rowToDelete = null;

});

confirmDelete.addEventListener("click", async ()=>{

    if(rowToDelete){

        const id = rowToDelete.dataset.id;

        confirmDelete.disabled = true;

        const { error } = await supabaseClient
            .from("inventario")
            .delete()
            .eq("id", id);

        confirmDelete.disabled = false;

        if(error){
            console.error(error);
            modalDelete.style.display = "none";
            return;
        }

        rowToDelete.remove();
        rowToDelete = null;

    }

    modalDelete.style.display = "none";

});

modalDelete.addEventListener("click",(e)=>{

    if(e.target === modalDelete){

        modalDelete.style.display = "none";
        rowToDelete = null;

    }

});

    function crearFilaCompatibilidadEdit(modelo = "", anio_inicio = "", anio_fin = ""){

    const div = document.createElement("div");
    div.className = "compatibilidad";

    div.innerHTML = `
    <input
        type="text"
        class="modeloEdit"
        placeholder="Modelo (Ej: Nissan Sentra)"
        value="${modelo.replace(/"/g, '&quot;')}"
        required>

    <input
        type="number"
        class="anioInicioEdit"
        placeholder="Desde"
        value="${anio_inicio}">

    <input
        type="number"
        class="anioFinEdit"
        placeholder="Hasta"
        value="${anio_fin}">

    <button
        type="button"
        class="eliminarCompatibilidad"
        onclick="eliminarCompatibilidadEdit(this)">
        ❌
    </button>
    `;

    return div;

}

    function eliminarCompatibilidadEdit(btn){

    const contenedor = document.getElementById("compatibilidadesEdit");

    if(contenedor.children.length > 1){
        btn.closest(".compatibilidad").remove();
    }

}

    document.getElementById("agregarCompatibilidadEdit").addEventListener("click", () => {

    compatibilidadesEditContainer.appendChild(crearFilaCompatibilidadEdit());

});

    function editRow(btn){

    rowToEdit = btn.closest("tr");

    const id = rowToEdit.dataset.id;
    const producto = productosCache.find(p => String(p.id) === String(id));

    if(!producto){
        console.error("No se encontró el producto en cache:", id);
        return;
    }

    editCodigo.value = producto.codigo_producto || "";
    editNombre.value = producto.nombre_pieza || "";
    editMarca.value = producto.marca || "";
    editProveedor.value = producto.proveedor || "";

    const tiposProducto = Array.isArray(producto.tipo) ? producto.tipo : [];
    document.querySelectorAll(".editTipoCheckbox").forEach(cb => {
        cb.checked = tiposProducto.includes(cb.value);
    });

    editCategoria.value = producto.categoria || "";
    editPrecio.value = producto.precio;
    editStock.value = producto.stock;

    // Reconstruir filas de compatibilidad
    compatibilidadesEditContainer.innerHTML = "";

    const compatibilidades = Array.isArray(producto.compatibilidades) && producto.compatibilidades.length > 0
        ? producto.compatibilidades
        : [{ modelo: "", anio_inicio: "", anio_fin: "" }];

    compatibilidades.forEach(c => {
        compatibilidadesEditContainer.appendChild(
            crearFilaCompatibilidadEdit(c.modelo || "", c.anio_inicio || "", c.anio_fin || "")
        );
    });

    modalEdit.style.display = "flex";

}
    cancelEdit.addEventListener("click", () => {

    modalEdit.style.display = "none";
    rowToEdit = null;

});
    saveEdit.addEventListener("click", async () => {

    if (!rowToEdit) return;

    const id = rowToEdit.dataset.id;

    const nuevoNombre = editNombre.value.trim();
    const nuevaMarca = editMarca.value.trim();
    const nuevoProveedor = editProveedor.value.trim();

    const nuevosTipos = Array.from(
        document.querySelectorAll(".editTipoCheckbox:checked")
    ).map(cb => cb.value);

    const nuevaCategoria = editCategoria.value;
    const nuevoPrecio = parseFloat(editPrecio.value);
    const nuevoStock = parseInt(editStock.value);

    if(!nuevoNombre || !nuevaMarca || !nuevoProveedor || isNaN(nuevoPrecio) || isNaN(nuevoStock)){
        mostrarMensaje(
    "Campos incompletos",
    "Por favor completa todos los campos correctamente"
);
        return;
    }

    if(nuevosTipos.length === 0){
        mostrarMensaje(
    "Tipo de vehículo",
    "Selecciona al menos un tipo (Auto, Motocicleta o Lancha)"
);
        return;
    }

    // Reconstruir arreglo de compatibilidades
    const nuevasCompatibilidades = [];

    compatibilidadesEditContainer.querySelectorAll(".compatibilidad").forEach(c => {

        const modelo = c.querySelector(".modeloEdit").value.trim();
        const anio_inicio = c.querySelector(".anioInicioEdit").value;
        const anio_fin = c.querySelector(".anioFinEdit").value;

        if(modelo){
            nuevasCompatibilidades.push({
                modelo,
                anio_inicio: anio_inicio ? parseInt(anio_inicio) : null,
                anio_fin: anio_fin ? parseInt(anio_fin) : null
            });
        }

    });

    saveEdit.disabled = true;

    const { error } = await supabaseClient
        .from("inventario")
        .update({
            nombre_pieza: nuevoNombre,
            marca: nuevaMarca,
            proveedor: nuevoProveedor,
            tipo: nuevosTipos,
            categoria: nuevaCategoria,
            compatibilidades: nuevasCompatibilidades,
            precio: nuevoPrecio,
            stock: nuevoStock
        })
        .eq("id", id);

    saveEdit.disabled = false;

    if (error) {
        console.error(error);
        mostrarMensaje(
    "Error",
    "No fue posible guardar los cambios\n\n" +
    (error.message || JSON.stringify(error))
);
        return;
    }

    modalEdit.style.display = "none";
    rowToEdit = null;

    cargarInventario();

});
    modalEdit.addEventListener("click", (e) => {

    if (e.target === modalEdit) {

        modalEdit.style.display = "none";
        rowToEdit = null;

    }

});

/* ==========================
   CERRAR SESIÓN
========================== */

function cerrarSesion(){

    localStorage.clear();
    location.href = "index.html";

}

    
</script>

</body>

</html>
